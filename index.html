                  a2.download='moneymind-backup-'+(new Date().toISOString().slice(0,10))+'.json';
                  a2.click();URL.revokeObjectURL(a2.href);
                  addToast({type:'s',icon:'💾',title:'Backup saved',msg:'Keep this .json file safe'});

                <label style={{padding:'12px',background:C.card,border:`1.5px solid ${C.rule}`,borderRadius:10,color:C.gold,fontFamily:'var(--sans)',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                  ⬆ Import Backup
                  <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                    const file=e.target.files[0];if(!file)return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      try{
                        const p=JSON.parse(ev.target.result);
                        if(!p.data||!p.data.expenses)throw new Error('Invalid file');
                        const restored=p.data;

                        addToast({type:'s',icon:'✅',title:'Data restored!',msg:restored.expenses.length+' expenses loaded'});
                      }catch(err){addToast({type:'d',icon:'❌',title:'Import failed',msg:'File appears to be invalid'});}
                    };
                    reader.readAsText(file);
                    e.target.value='';
                  }}/>
                </label>
              </div>
              <div style={{marginTop:12,fontSize:11,color:C.faint,lineHeight:1.7}}>
                Tip: if you share this file with a friend, they get a blank app — their data is separate from yours.

            </div>

            {user?.provider==='google'&&(
              <div style={{background:C.bluedim,border:`1.5px solid rgba(53,96,168,.18)`,borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:12,color:C.ink2,lineHeight:1.7}}>
                Your data is linked to your Google account. Sign in with the same Google account on any device or browser to access your data.
              </div>
            )}
            <button className="btn-danger" style={{width:'100%'}} onClick={onLogout}>Sign out of {user?.name?.split(' ')[0]||'Account'}</button>
          </div>
        )}

        {/* Danger */}
        {sec==='danger'&&(
          <div className="fade-in">
            <div style={{...serif,fontWeight:700,fontSize:26,color:C.red,letterSpacing:'-.02em',marginBottom:3}}>Danger Zone</div>

            {/* Clear all */}
            <div style={{background:C.reddim,border:`1.5px solid rgba(184,58,58,.2)`,borderRadius:14,padding:20,marginBottom:16}}>
              <div style={{fontFamily:'var(--serif)',fontWeight:700,fontSize:18,color:C.red,marginBottom:6}}>Clear All Data</div>
              <p style={{fontSize:13,color:C.ink2,lineHeight:1.75,marginBottom:16}}>Permanently deletes all expenses, goals, budget settings, and recurring costs. Your login stays active.</p>
              {!confirmClear
                ?<button className="btn-danger" onClick={()=>setConfirmClear(true)}>🗑 Clear All Data Permanently</button>
                :<div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.red}}>Are you sure? This cannot be undone.</div>

                    <button className="btn-danger" style={{flex:1}} onClick={clearAll}>Yes, delete everything</button>
                    <button onClick={()=>setConfirmClear(false)} style={{flex:1,padding:'9px',background:'none',border:'1.5px solid var(--rule)',borderRadius:8,cursor:'pointer',fontFamily:'var(--sans)',fontWeight:600,fontSize:13,color:C.faint}}>Cancel</button>
                  </div>
                </div>
              }
            </div>

            {/* Backup & Restore */}
            <div style={{background:C.bluedim,border:`1.5px solid rgba(53,96,168,.18)`,borderRadius:14,padding:20}}>
              <div style={{fontFamily:'var(--serif)',fontWeight:700,fontSize:18,color:C.blue,marginBottom:6}}>Backup &amp; Restore</div>
              <p style={{fontSize:13,color:C.ink2,lineHeight:1.75,marginBottom:16}}>Export all your data as JSON to keep a backup or transfer to another device.</p>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{
                  const a=document.createElement('a');
                  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
                  a.download='moneymind_backup_'+new Date().toISOString().slice(0,10)+'.json';
                  a.click();
                  addToast({type:'s',icon:'💾',title:'Backup exported'});
                }}>↓ Export JSON</button>
                <label className="btn btn-ghost" style={{fontSize:12,cursor:'pointer'}}>
                  ↑ Import JSON
                  <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                    const f=e.target.files[0];if(!f)return;
                    const r=new FileReader();
                    r.onload=ev=>{
                      try{
                        const imp=JSON.parse(ev.target.result);
                        const nd={months:imp.months||{},expenses:imp.expenses||[],goals:imp.goals||[],recurringCosts:imp.recurringCosts||[]};
                        const s=saveData(userId,nd);onDataChange({...s});
                        addToast({type:'s',icon:'✅',title:'Data restored!'});
                      }catch(err){addToast({type:'d',icon:'❌',title:'Invalid backup file'});}
                    };
                    r.readAsText(f);
                  }}/>
                </label>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


/* ══════════════════════════
   ANALYTICS TAB
   ══════════════════════════ */
function AnalyticsTab({data,currentMonth}){
  const{expenses=[],months={},customCats=[]}=data;
  const[view,setView]=useState("daily"); // "daily" | "monthly"
  const[selMonth,setSelMonth]=useState(currentMonth);

  // ── Daily data for selected month ──
  const DIMv=DIM(selMonth);
  const monthExps=expenses.filter(e=>e.date.startsWith(selMonth));
  const ms=months[selMonth]||null;
  const spendBudget=ms?.spendBudget||0;
  const dailyLim=spendBudget>0?spendBudget/DIMv:0;

  const dailyData=Array.from({length:DIMv},(_,i)=>{
    const day=String(i+1).padStart(2,"0");
    const ds=selMonth+"-"+day;
    const total=monthExps.filter(e=>e.date===ds).reduce((a,e)=>a+e.amount,0);
    const d=new Date(ds+"T00:00:00");
    const label=String(i+1);
    const dow=["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()];
    return{date:ds,day:i+1,label,dow,total,isWeekend:d.getDay()===0||d.getDay()===6};
  });
  const maxDayVal=Math.max(1,...dailyData.map(d=>d.total));
  const dailyAvg=dailyData.length>0?monthExps.reduce((a,e)=>a+e.amount,0)/dailyData.filter(d=>d.total>0).length||0:0;
  const daysOver=dailyData.filter(d=>d.total>dailyLim&&dailyLim>0).length;
  const bestDay=dailyData.reduce((a,b)=>b.total>0&&(a.total===0||b.total<a.total)?b:a,{total:0,label:"-"});
  const worstDay=dailyData.reduce((a,b)=>b.total>a.total?b:a,{total:0,label:"-"});
  const todayStr=todayISO();

  // ── Monthly comparison data ──
  const allMonths=Array.from(new Set(expenses.map(e=>e.date.slice(0,7)))).sort();
  // Include up to current even if no expenses
  if(!allMonths.includes(currentMonth))allMonths.push(currentMonth);
  const monthlyData=allMonths.map(mo=>{
    const exps=expenses.filter(e=>e.date.startsWith(mo));
    const total=exps.reduce((a,e)=>a+e.amount,0);
    const mss=months[mo]||null;
    const budget=mss?.spendBudget||0;
    const txns=exps.length;
    const cats=CATS.map(c=>({c,t:exps.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
    return{mo,total,budget,txns,cats,label:MSHT[+mo.split("-")[1]-1]+" "+mo.split("-")[0].slice(2)};
  });
  const maxMonthVal=Math.max(1,...monthlyData.map(m=>m.total));
  const avgMonthly=monthlyData.length>0?monthlyData.reduce((a,m)=>a+m.total,0)/monthlyData.length:0;
  const trendMonths=monthlyData.slice(-3);
  const trend=trendMonths.length>=2?trendMonths[trendMonths.length-1].total-trendMonths[0].total:0;

  // Monthly available months selector
  const monthOptions=Array.from(new Set(expenses.map(e=>e.date.slice(0,7)))).sort((a,b)=>b.localeCompare(a));
  if(!monthOptions.includes(currentMonth))monthOptions.unshift(currentMonth);

  const catColors={Food:"#f59e0b",Transport:"#4a85c9",Shopping:"#e879a0",Bills:"#c05050",Health:"#3fa86b",Entertainment:"#8b6ee0",Other:"#8c7060"};

  if(expenses.length===0)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}>
      <div style={{textAlign:"center",padding:48,color:"var(--faint)"}}>
        <div style={{fontSize:48,marginBottom:14}}>📈</div>
        <div style={{fontFamily:"var(--serif)",fontWeight:800,fontSize:20,color:"var(--ink2)",marginBottom:8}}>No data yet</div>
        <p style={{fontSize:13,lineHeight:1.8}}>Add some expenses and come back to see your analytics.</p>
      </div>
    </div>
  );

  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}} className="fade-in">

      {/* Toggle */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"var(--serif)",fontWeight:800,fontSize:22,color:"var(--ink)"}}>Analytics</div>
          <div style={{fontSize:13,color:"var(--faint)"}}>Spending patterns &amp; comparisons</div>
        </div>
        <div style={{display:"flex",gap:4,background:"var(--wash)",border:"1.5px solid var(--rule)",borderRadius:10,padding:3}}>
          {[["daily","📅 Daily"],["monthly","📆 Monthly"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{border:"none",padding:"7px 16px",borderRadius:7,fontFamily:"var(--sans)",fontSize:13,fontWeight:700,cursor:"pointer",background:view===v?"#fff":"transparent",color:view===v?"var(--gold)":"var(--faint)",boxShadow:view===v?"var(--s1)":"none",transition:"all .2s"}}>{l}</button>
          ))}
        </div>
      </div>

      {view==="daily"&&(
        <>
          {/* Month picker */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {monthOptions.slice(0,6).map(mo=>(
              <button key={mo} onClick={()=>setSelMonth(mo)} style={{border:"1.5px solid",borderColor:selMonth===mo?"var(--gold)":"var(--rule)",borderRadius:999,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",background:selMonth===mo?"var(--golddim)":"#fff",color:selMonth===mo?"var(--gold)":"var(--faint)",transition:"all .2s",fontFamily:"inherit"}}>{fmtMYS(mo)}</button>
            ))}
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {[
              {l:"Total Spent",v:fmt(monthExps.reduce((a,e)=>a+e.amount,0)),sub:`${monthExps.length} transactions`,col:"var(--red)"},
              {l:"Avg Spend Day",v:fmt(Math.round(dailyAvg)),sub:"on days you spent",col:"var(--gold)"},
              {l:"Days Over Limit",v:daysOver+(daysOver===1?" day":" days"),sub:dailyLim>0?`limit: ${fmt(dailyLim)}/day`:"no limit set",col:daysOver>0?"var(--red)":"var(--green)"},
              {l:"Best Day",v:bestDay.total>0?("Day "+bestDay.label):"—",sub:bestDay.total>0?fmt(bestDay.total)+" spent":"no spending",col:"var(--green)"},
            ].map(k=>(
              <div key={k.l} style={{background:"#fff",border:"1.5px solid var(--rule)",borderRadius:12,padding:"14px 16px",boxShadow:"var(--s1)"}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:"var(--faint)",marginBottom:4}}>{k.l}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:k.col,marginBottom:2}}>{k.v}</div>
                <div style={{fontSize:11,color:"var(--faint)"}}>{k.sub}</div>
              </div>
            ))}

                <div style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:k.col,marginBottom:2}}>{k.v}</div>

          {/* Month bar chart */}
          <div style={{background:"#fff",border:"1.5px solid var(--rule)",borderRadius:14,padding:"20px",boxShadow:"var(--s1)"}}>

              <div>
                <div style={{fontWeight:700,fontSize:15,color:"var(--ink)"}}>Month-by-Month Spending</div>
                <div style={{fontSize:12,color:"var(--faint)",marginTop:2}}>Click a bar to see that month in Daily view</div>
              </div>
              <div style={{display:"flex",gap:12,fontSize:11,color:"var(--faint)"}}>
                <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:"var(--blue)",opacity:.7,display:"inline-block"}}/>Spending</span>
                <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:"var(--green)",opacity:.5,display:"inline-block"}}/>Budget</span>
                <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:"var(--gold)",display:"inline-block"}}/>Current</span>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <div style={{display:"flex",alignItems:"flex-end",gap:10,height:200,minWidth:Math.max(500,monthlyData.length*80)+"px",position:"relative"}}>
                {/* Average line */}
                {avgMonthly>0&&(
                  <div style={{position:"absolute",left:0,right:0,height:1,background:"var(--ghost)",bottom:(avgMonthly/maxMonthVal*180)+"px",zIndex:1}}>
                    <span style={{position:"absolute",right:4,top:-13,fontSize:9,color:"var(--faint)",fontFamily:"var(--mono)"}}>avg {fmt(Math.round(avgMonthly))}</span>
                  </div>
                )}
                {monthlyData.map(m=>{
                  const h2=Math.max(4,m.total/maxMonthVal*180);
                  const bh=m.budget>0?Math.max(2,m.budget/maxMonthVal*180):0;
                  const isOver2=m.budget>0&&m.total>m.budget;
                  const isCur=m.mo===currentMonth;
                  return(
                    <div key={m.mo} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flex:1,cursor:"pointer",minWidth:60}} onClick={()=>{setSelMonth(m.mo);setView("daily");}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:isCur?"var(--gold)":isOver2?"var(--red)":"var(--ink)"}}>{fmt(m.total)}</div>
                      <div style={{width:"100%",height:180,display:"flex",alignItems:"flex-end",gap:3,position:"relative"}}>
                        {/* Budget bar behind */}
                        {bh>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:bh,background:"var(--green)",opacity:.15,borderRadius:"4px 4px 0 0"}}/>}
                        {/* Budget line */}
                        {bh>0&&<div style={{position:"absolute",left:0,right:0,height:2,background:"var(--green)",opacity:.5,bottom:bh}}/>}
                        {/* Spending bar */}
                        <div style={{width:"100%",height:h2,borderRadius:"5px 5px 0 0",background:isCur?"var(--gold)":isOver2?"var(--red)":"var(--blue)",opacity:isCur?1:0.7,transition:"height .6s ease",outline:isCur?"2px solid var(--gold)":"none",outlineOffset:1}}/>
                      </div>
                      <div style={{fontSize:10,color:isCur?"var(--gold)":"var(--faint)",fontWeight:isCur?700:400,textAlign:"center",lineHeight:1.2}}>{m.label}</div>
                      {m.txns>0&&<div style={{fontSize:9,color:"var(--ghost)"}}>{m.txns}tx</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Month table + category heatmap */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {/* Month table */}
            <div style={{background:"#fff",border:"1.5px solid var(--rule)",borderRadius:14,padding:"18px 20px",boxShadow:"var(--s1)"}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--ink)",marginBottom:14}}>Monthly Summary</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>
                      {["Month","Spent","Budget","Transactions","Status"].map(h2=>(
                        <th key={h2} style={{textAlign:"left",padding:"6px 8px",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"var(--faint)",borderBottom:"1.5px solid var(--rule)"}}>{h2}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...monthlyData].reverse().map(m=>{
                      const isOver2=m.budget>0&&m.total>m.budget;
                      const isCur=m.mo===currentMonth;
                      return(
                        <tr key={m.mo} style={{borderBottom:"1px solid var(--rule)",cursor:"pointer",background:isCur?"rgba(196,123,26,.04)":"transparent"}} onClick={()=>{setSelMonth(m.mo);setView("daily");}}>
                          <td style={{padding:"8px 8px",fontWeight:isCur?700:600,color:isCur?"var(--gold)":"var(--ink)"}}>{m.label}</td>
                          <td style={{padding:"8px 8px",fontFamily:"var(--mono)",color:isOver2?"var(--red)":"var(--ink)",fontWeight:600}}>{fmt(m.total)}</td>
                          <td style={{padding:"8px 8px",fontFamily:"var(--mono)",color:"var(--faint)"}}>{m.budget>0?fmt(m.budget):"—"}</td>
                          <td style={{padding:"8px 8px",color:"var(--faint)"}}>{m.txns}</td>
                          <td style={{padding:"8px 8px"}}>
                            {m.total===0?<span style={{color:"var(--faint)",fontSize:11}}>—</span>:
                              isOver2?<span className="badge br">Over</span>:
                              m.budget>0?<span className="badge bg">On Track</span>:
                              <span className="badge bb">{m.txns} tx</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Category totals across months */}
            <div style={{background:"#fff",border:"1.5px solid var(--rule)",borderRadius:14,padding:"18px 20px",boxShadow:"var(--s1)"}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--ink)",marginBottom:4}}>All-Time by Category</div>
              <div style={{fontSize:12,color:"var(--faint)",marginBottom:14}}>Total across all months</div>
              {CATS.map(c=>{
                const t=expenses.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0);
                const allTotal=expenses.reduce((a,e)=>a+e.amount,0);
                const pct=allTotal>0?Math.round(t/allTotal*100):0;
                if(t===0)return null;
                return(
                  <div key={c} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{width:28,height:28,borderRadius:8,background:getCBG(c,customCats),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{getCIcon(c,customCats)}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12}}>
                        <span style={{fontWeight:600}}>{c}</span>
                        <span style={{display:"flex",gap:8}}>
                          <span style={{fontFamily:"var(--mono)",fontWeight:700,color:getCColor(c,customCats)}}>{fmt(t)}</span>
                          <span style={{color:"var(--faint)"}}>{pct}%</span>
                        </span>
                      </div>
                      <PBar val={t} max={allTotal} h={5} color={getCColor(c,customCats)}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ── Insights Tab: What-If, Year Wrapped, Deep Stats ── */
function InsightsTab({data,ms,currentMonth,onDataChange,userId,addToast}){
  const{expenses=[],goals=[],months={},customCats=[]}=data;
  const[view,setView]=useState('whatif'); // whatif | wrapped | personality
  const allCats=getAllCats(customCats);

  /* ── What-If Calculator ── */
  const[catCuts,setCatCuts]=useState({});
  const income=ms?.income||0;
  const spendBudget=ms?.spendBudget||0;
  const saveTarget=ms?.saveTarget||0;
  const moExps=expenses.filter(e=>e.date.startsWith(currentMonth));
  const moSpent=moExps.reduce((a,e)=>a+e.amount,0);
  // Use all expenses to build category list (so every cat you've ever used appears)
  const catTotals=allCats.map(c=>({c,t:moExps.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0),allT:expenses.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(x=>x.allT>0).sort((a,b)=>b.t-a.t);
  const totalSaved=goals.reduce((a,g)=>a+g.saved,0);
  const totalGoals=goals.reduce((a,g)=>a+g.target,0);
  const totalCut=catTotals.reduce((a,{c,t})=>a+Math.round(t*(catCuts[c]||0)/100),0);
  const newMonthlySpend=moSpent-totalCut;
  const newMonthlySave=Math.max(0,income-newMonthlySpend);
  const savingsBoost=newMonthlySave-(income-moSpent);
  const goalImpacts=goals.filter(g=>g.saved<g.target).map(g=>{
    const rem=g.target-g.saved;
    const oldMos=saveTarget>0?Math.ceil(rem/saveTarget):null;
    const newMos=newMonthlySave>0?Math.ceil(rem/newMonthlySave):null;
    const saved=oldMos&&newMos?oldMos-newMos:null;
    return{...g,oldMos,newMos,saved};
  });

  /* ── Year Wrapped ── */
  const year=currentMonth.slice(0,4);
  const yearExps=expenses.filter(e=>e.date.startsWith(year));
  const yearTotal=yearExps.reduce((a,e)=>a+e.amount,0);
  const yearByMonth=Array.from({length:12},(_,i)=>{
    const mo=year+'-'+(String(i+1).padStart(2,'0'));
    const t=yearExps.filter(e=>e.date.startsWith(mo)).reduce((a,e)=>a+e.amount,0);
    return{mo,t,label:MSHT[i]};
  });
  const biggestMonth=yearByMonth.reduce((a,b)=>b.t>a.t?b:a,{t:0,label:'-'});
  const quietestMonth=yearByMonth.filter(m=>m.t>0).reduce((a,b)=>b.t<a.t?b:a,{t:Infinity,label:'-'});
  const yearCats=allCats.map(c=>({c,t:yearExps.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
  const topYearCat=yearCats[0];
  const yearIncome=Object.values(months).filter(m=>m&&currentMonth.startsWith(year)?true:Object.keys(months).find(k=>k.startsWith(year))).reduce((a,m)=>a+(m?.income||0),0);
  const goalsCompleted=goals.filter(g=>g.saved>=g.target).length;
  const personality=getPersonality(yearExps,months);
  const maxMonthVal=Math.max(1,...yearByMonth.map(m=>m.t));
  const yearStreakBest=useMemo(()=>{
    if(!ms?.spendBudget)return 0;
    const dl=ms.spendBudget/30;
    let best=0,cur=0;
    const dates=yearExps.map(e=>e.date).filter((v,i,a)=>a.indexOf(v)===i).sort();
    dates.forEach(d=>{
      const t=yearExps.filter(e=>e.date===d).reduce((a,e)=>a+e.amount,0);
      if(t<=dl)cur++;else{if(cur>best)best=cur;cur=0;}
    });
    return Math.max(best,cur);
  },[yearExps,ms]);

  const card={background:'var(--card)',border:'1.5px solid var(--rule)',borderRadius:'var(--r)',boxShadow:'var(--s1)',padding:'20px 22px'};

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}} className="fade-in">

      {/* Tab switcher */}
      <div style={{display:'flex',gap:8,background:'var(--wash)',padding:6,borderRadius:12,width:'fit-content'}}>
        {[['whatif','🔮 What-If'],['wrapped','🎁 Year Wrapped'],['personality','🧠 Personality']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:'8px 18px',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'var(--sans)',fontWeight:700,fontSize:12,transition:'all .2s',background:view===v?'var(--card)':'none',color:view===v?'var(--gold)':'var(--faint)',boxShadow:view===v?'var(--s1)':'none'}}>{l}</button>
        ))}
      </div>

      {/* ── What-If Calculator ── */}
      {view==='whatif'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{...card}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.3,color:'var(--faint)',marginBottom:4}}>What-If Calculator</div>
            <div style={{fontFamily:'var(--serif)',fontWeight:700,fontSize:22,color:'var(--ink)',marginBottom:4,letterSpacing:'-.02em'}}>Cut spending → reach goals faster</div>
            <div style={{fontSize:12,color:'var(--faint)',marginBottom:20,lineHeight:1.6}}>Drag each slider to see how cutting that category affects your savings and goal timelines.</div>
            {catTotals.length===0?(
              <div style={{textAlign:'center',padding:'32px 0',color:'var(--ghost)'}}>
                <div style={{fontSize:36,marginBottom:10}}>📊</div>
                <div style={{fontSize:13}}>Add some expenses first to use the calculator.</div>
              </div>
            ):catTotals.map(({c,t})=>(
              <div key={c} style={{marginBottom:18}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:16}}>{getCIcon(c,customCats)}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--ink2)'}}>{c}</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--faint)'}}>{fmt(t)}/mo</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {(catCuts[c]||0)>0&&<span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--green)'}}>−{fmt(Math.round(t*(catCuts[c]||0)/100))}</span>}
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:'var(--plum)',minWidth:36,textAlign:'right'}}>{catCuts[c]||0}%</span>
                  </div>
                </div>

/* ── QuickAdd Modal ── */
function QuickAddModal({data,ms,currentMonth,onDataChange,addToast,userId,onClose}){
  const{expenses=[],recurringCosts=[],customCats=[]}=data;
  const allCats=getAllCats(customCats);
  const spendBudget=ms?.spendBudget||0;
  const fixedMo=recurringCosts.filter(r=>r.type==="monthly").reduce((a,r)=>a+r.amount,0);
  const dailyLim=spendBudget>0?Math.max(0,spendBudget-fixedMo)/effectiveDailyDays(ms,currentMonth):0;
  const todayStr=todayISO();
  const[desc,setDesc]=useState("");
  const[amount,setAmount]=useState("");
  const[cat,setCat]=useState(allCats[0]||"Food");
  const[date,setDate]=useState(todayStr);
  const[note,setNote]=useState("");
  const submit=()=>{
    const amt=Number(amount);if(!amt)return;
    const ne={id:uid(),desc:desc.trim()||cat,amount:amt,category:cat,date,note:note.trim(),recurring:false};
    const nd={...data,expenses:[...expenses,ne]};
    const saved=saveData(userId,nd);onDataChange({...saved});
    const todayTotal=expenses.filter(e=>e.date===todayStr).reduce((a,e)=>a+e.amount,0)+amt;
    if(dailyLim>0&&todayTotal>dailyLim)addToast({type:"d",icon:"⚠️",title:"Over daily limit",msg:"Today: "+fmt(todayTotal)+" / limit "+fmt(dailyLim)});
    else addToast({type:"s",icon:"✅",title:"Logged!",msg:fmt(amt)+" for "+cat});
    onClose();
  };
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fade-in" style={{maxWidth:420}}>
        <div className="modal-hdr">
          <div><div className="modal-title">Quick Add</div><div className="modal-sub">Log an expense fast</div></div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div className="field" style={{marginBottom:12}}>
          <label className="flbl">Amount</label>
          <input className="inp-xl" type="number" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} autoFocus/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div className="field">
            <label className="flbl">Category</label>
            <select className="inp" value={cat} onChange={e=>setCat(e.target.value)}>
              {allCats.map(c=><option key={c}>{getCIcon(c,customCats)} {c}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="flbl">Date</label>
            <input className="inp" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
        </div>
        <div className="field" style={{marginBottom:10}}>
          <label className="flbl">Description (optional)</label>
          <input className="inp" placeholder="What was this for?" value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>
        <div className="field" style={{marginBottom:18}}>
          <label className="flbl">Note (optional)</label>
          <input className="inp" placeholder="Any extra detail..." value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <button className="btn btn-gold btn-full" onClick={submit}>Log Expense →</button>
      </div>
    </div>
  );
}

function AuthScreen({onAuth}){
  const[mode,setMode]=useState("login");
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[showGCfg,setShowGCfg]=useState(false);
  const[gcid,setGcid]=useState(GOOGLE_CLIENT_ID);
  const gRef=useRef(null);

  useEffect(()=>{
    const cid=GOOGLE_CLIENT_ID;
    if(!window.google||!cid||cid.includes("YOUR_"))return;
    try{
      window.google.accounts.id.initialize({client_id:cid,callback:r=>{
        const res=Auth.googleSignIn(r.credential);
        if(res.user)onAuth(res.user);else setErr("Google sign-in failed.");
      }});
      window.google.accounts.id.renderButton(gRef.current,{type:"standard",theme:"outline",size:"large",width:340,text:mode==="register"?"signup_with":"signin_with"});
    }catch(e){}
  },[mode,gcid]);

  const submit=()=>{
    setErr("");setLoading(true);
    setTimeout(()=>{
      const res=mode==="login"?Auth.login(email,pass):Auth.register(email,pass,name);
      setLoading(false);
      if(res.err)setErr(res.err);
      else onAuth(res.user);
    },220);
  };

  const isGoogleReady=GOOGLE_CLIENT_ID&&!GOOGLE_CLIENT_ID.includes("YOUR_");

  return(
    <div className="auth-wrap">
      <div className="auth-card fade-in">
        {/* Brand */}
        <div className="auth-brand">
          <div className="auth-brand-mark">💰</div>
          <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:26,color:"var(--ink)",letterSpacing:"-.02em"}}>
            Money<em style={{color:"var(--gold)",fontStyle:"normal"}}>Mind</em>
          </div>
        </div>
        <div className="auth-tagline">Track spending. Hit goals. Stay in control.</div>

        {/* Tabs */}
        <div className="auth-tabs">
          <button className={`auth-tab${mode==="login"?" act":""}`} onClick={()=>{setMode("login");setErr("");}}>Sign In</button>
          <button className={`auth-tab${mode==="register"?" act":""}`} onClick={()=>{setMode("register");setErr("");}}>Create Account</button>
        </div>

        {/* Google */}
        {isGoogleReady?(
          <div ref={gRef} style={{marginBottom:16}}/>
        ):(
          <div>
            <button className="g-btn" onClick={()=>setShowGCfg(v=>!v)}>
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width={18} height={18} alt=""/>
              {showGCfg?"Hide Google setup":"Continue with Google"}
            </button>
            {showGCfg&&(
              <div style={{background:"var(--wash)",border:"1.5px solid var(--rule)",borderRadius:10,padding:"14px 16px",marginBottom:14,fontSize:12,color:"var(--ink2)",lineHeight:1.8}}>
                <strong style={{color:"var(--gold)"}}>Enable Google Sign-In:</strong><br/>
                1. Go to <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer" style={{color:"var(--blue)"}}>console.cloud.google.com</a><br/>
                2. APIs &amp; Services → Credentials → Create OAuth 2.0 Client ID<br/>
                3. Set Authorised origin to your hosted domain<br/>
                4. Paste Client ID in <code style={{background:"var(--tint)",padding:"1px 5px",borderRadius:4,fontSize:11,fontFamily:"var(--mono)"}}>APP_CONFIG.googleClientId</code>
              </div>
            )}
          </div>
        )}

        <div className="or-div">or with email</div>

        {/* Email form */}
        {mode==="register"&&(
          <div className="field" style={{marginBottom:11}}>
            <label className="flbl">Your Name</label>
            <input className="inp" placeholder="e.g. Rahim" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
        )}
        <div className="field" style={{marginBottom:11}}>
          <label className="flbl">Email Address</label>
          <input className="inp" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="field" style={{marginBottom:18}}>
          <label className="flbl">Password</label>
          <input className="inp" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {err&&<div className="err-box">{err}</div>}
        <button className="btn btn-gold btn-full" onClick={submit} disabled={loading}>
          {loading?<span className="spin" style={{width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block"}}/>:mode==="login"?"Sign In →":"Create Account →"}
        </button>
        <p style={{fontSize:11,color:"var(--ghost)",textAlign:"center",marginTop:14,lineHeight:1.7}}>
          🔒 Data is stored privately in your browser<br/>
          <span style={{color:"var(--faint)"}}>Works offline · No account required for email sign-in</span>
        </p>
      </div>
    </div>
  );
}

/* ══════════════════════════
   ROOT APP
   ══════════════════════════ */
function App(){
  const[screen,setScreen]=useState("loading");
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[data,setData]=useState(null);
  const[toasts,setToasts]=useState([]);
  const[showMoModal,setShowMoModal]=useState(false);
  const[showQuickAdd,setShowQuickAdd]=useState(false);
  const[pwaReady,setPwaReady]=useState(false);
  const[cur,setCur]=useState(monthISO());
  useEffect(()=>{
    const t=setInterval(()=>setCur(monthISO()),60000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    loadAuth().then(cu=>{
      if(cu){loadData(cu.uid).then(d=>{setUser(cu);setData(d||emptyData());setScreen("app");});}
      else setScreen("auth");
    });
    const onPrompt=()=>setPwaReady(true);
    if(window._pwaPrompt)setPwaReady(true);
    window.addEventListener("beforeinstallprompt",onPrompt);
    return()=>window.removeEventListener("beforeinstallprompt",onPrompt);
  },[]);

  useEffect(()=>{
    if(screen!=="app"||!data)return;
    document.documentElement.setAttribute("data-theme",data.darkMode?"dark":"light");
  },[screen,data?.darkMode]);

  useEffect(()=>{
    if(screen!=="app"||!data)return;
    const lm=new Date();lm.setMonth(lm.getMonth()-1);
    const lmk=lm.toISOString().slice(0,7);
    if(data.months?.[lmk]&&!data.months?.[cur])
      setTimeout(()=>addToast({type:"w",icon:"📅",title:"New month!",msg:"Set your budget for "+fmtMYS(cur)}),800);
  },[screen]);

  const addToast=useCallback(t=>{const id=uid();setToasts(p=>[...p,{...t,id}]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),5500);},[]);
  const rmToast=id=>setToasts(p=>p.filter(x=>x.id!==id));
  const onAuth=u=>{loadData(u.uid).then(d=>{setUser(u);setData(d||emptyData());setScreen("app");});};
  const onLogout=()=>{Auth.logout();setUser(null);setData(null);setScreen("auth");};
  const onDataChange=useCallback(nd=>setData(nd),[]);
  // Use current month budget; if missing carry over last month's (salary persists until re-entered)
  const ms=useMemo(()=>{
    const months=data?.months||{};
    if(months[cur])return months[cur];
    // find most recent previous month with a budget
    const keys=Object.keys(months).filter(k=>k<cur).sort();
    if(keys.length){const prev=months[keys[keys.length-1]];return{...prev,carriedOver:true};}
    return null;
  },[data,cur]);

  /* ── Loading ── */
  if(screen==="loading")return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--paper)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:44,height:44,background:"linear-gradient(145deg,var(--gold),var(--gold2))",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 16px",boxShadow:"0 4px 16px rgba(184,113,26,.25)"}}>💰</div>
        <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:26,color:"var(--ink)",letterSpacing:"-.02em",marginBottom:14}}>{APP_CONFIG.name}</div>
        <div style={{width:22,height:22,border:"2.5px solid var(--tint)",borderTopColor:"var(--gold)",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto"}}/>
      </div>
    </div>
  );
  if(screen==="auth")return <AuthScreen onAuth={onAuth}/>;

  const TABS=[
    {id:"dashboard",icon:"🏠",label:"Home"},
    {id:"expenses", icon:"📝",label:"Expenses"},
    {id:"analytics",icon:"📈",label:"Analytics"},
    {id:"insights", icon:"🔮",label:"Insights"},
    {id:"goals",    icon:"🎯",label:"Goals"},
    {id:"history",  icon:"🗂️",label:"History"},
    {id:"settings", icon:"⚙️",label:"Settings"},
  ];

  return(
    <div style={{height:"100vh",display:"grid",gridTemplateRows:"56px 1fr",gridTemplateColumns:"var(--sidebar) 1fr",overflow:"hidden"}}>
      <Toasts toasts={toasts} remove={rmToast}/>

      {/* ── Topbar ────────────────────────────────────────────── */}
      <header style={{gridColumn:"1/-1",background:"var(--card)",borderBottom:"1.5px solid var(--rule)",display:"flex",alignItems:"center",padding:"0 20px",gap:14,boxShadow:"var(--s1)",zIndex:60}}>
        <div style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",flexShrink:0}} onClick={()=>setTab("dashboard")}>
          <div style={{width:32,height:32,background:"linear-gradient(145deg,var(--gold),var(--gold2))",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:"0 2px 7px rgba(184,113,26,.28)",flexShrink:0}}>💰</div>
          <span style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:20,color:"var(--ink)",letterSpacing:"-.02em",lineHeight:1}}>
            {APP_CONFIG.name.slice(0,-4)}<em style={{color:"var(--gold)",fontStyle:"normal"}}>{APP_CONFIG.name.slice(-4)}</em>
          </span>
        </div>
        <div style={{flex:1}}/>
        <div style={{fontSize:11,fontWeight:600,color:"var(--faint)",letterSpacing:".3px"}}>{fmtMY(cur)}</div>
        {location.protocol==="file:"&&(
          <a href="https://app.netlify.com/drop" target="_blank" rel="noreferrer"
            style={{fontSize:11,color:"var(--gold)",fontWeight:700,textDecoration:"none",padding:"5px 11px",border:"1.5px solid rgba(184,113,26,.3)",borderRadius:7,transition:"all .2s"}}
            onMouseEnter={e=>{e.target.style.background="var(--golddim)";}}
            onMouseLeave={e=>{e.target.style.background="transparent";}}>
            🚀 Host Free
          </a>
        )}
        {pwaReady&&(
          <button className="btn btn-gold" style={{fontSize:11,padding:"6px 13px"}} onClick={()=>window._pwaPrompt?.prompt()}>⬇ Install App</button>
        )}
        <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--wash)",border:"1.5px solid var(--rule)",borderRadius:999,padding:"5px 13px 5px 5px",cursor:"pointer",transition:"all .18s"}}
          onClick={()=>setTab("settings")}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--rule)"}>
          {user?.picture
            ?<img src={user.picture} alt="" style={{width:26,height:26,borderRadius:"50%",objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>
            :<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(145deg,var(--gold),var(--gold2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0,fontFamily:"var(--serif)"}}>{(user?.name||"U")[0].toUpperCase()}</div>
          }
          <span style={{fontSize:13,fontWeight:600,color:"var(--ink2)"}}>{user?.name?.split(" ")[0]||"Account"}</span>
        </div>
      </header>

      {/* ── Sidebar ───────────────────────────────────────────── */}
      <aside className="sidebar-desktop" style={{background:"var(--card)",borderRight:"1.5px solid var(--rule)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Budget warning */}
        {!ms&&tab!=="settings"&&(
          <div style={{margin:"12px 12px 4px",padding:"12px 14px",background:"var(--gold-hi)",border:"1.5px solid rgba(184,113,26,.2)",borderRadius:11}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--gold)",marginBottom:7}}>📆 No budget for {fmtMYS(cur)}</div>
            <button className="btn btn-gold btn-full" style={{fontSize:11,padding:"8px"}} onClick={()=>setShowMoModal(true)}>Set Budget →</button>
          </div>
        )}
        {/* Nav items */}
        <nav style={{flex:1,padding:"10px 10px",overflowY:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              display:"flex",alignItems:"center",gap:11,padding:"11px 13px",borderRadius:10,
              cursor:"pointer",fontSize:13.5,fontWeight:600,border:"none",
              background:tab===t.id?"var(--golddim)":"transparent",
              color:tab===t.id?"var(--gold)":"var(--faint)",
              width:"100%",textAlign:"left",fontFamily:"var(--sans)",marginBottom:2,
              outline:tab===t.id?"1.5px solid rgba(184,113,26,.18)":"none",
              transition:"all .15s",letterSpacing:".1px"
            }}
            onMouseEnter={e=>{if(tab!==t.id){e.currentTarget.style.color="var(--ink2)";e.currentTarget.style.background="var(--wash)";}}}
            onMouseLeave={e=>{if(tab!==t.id){e.currentTarget.style.color="var(--faint)";e.currentTarget.style.background="transparent";}}}>
              <span style={{fontSize:16,width:20,textAlign:"center",flexShrink:0,lineHeight:1}}>{t.icon}</span>
              <span>{t.label}</span>
              {t.isNew&&<span style={{marginLeft:"auto",background:"var(--golddim)",color:"var(--gold)",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:5,letterSpacing:".3px"}}>NEW</span>}
            </button>
          ))}
        </nav>
        {/* User footer */}
        <div style={{borderTop:"1.5px solid var(--rule)",padding:"12px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:10,cursor:"pointer",transition:"background .15s"}}
            onClick={()=>setTab("settings")}
            onMouseEnter={e=>e.currentTarget.style.background="var(--wash)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            {user?.picture
              ?<img src={user.picture} alt="" style={{width:34,height:34,borderRadius:"50%",objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>
              :<div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(145deg,var(--gold),var(--gold2))",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--serif)",fontWeight:700,fontSize:16,color:"#fff",flexShrink:0}}>{(user?.name||"U")[0].toUpperCase()}</div>
            }
            <div style={{overflow:"hidden",flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.name||"Account"}</div>
              <div style={{fontSize:11,color:"var(--faint)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email}</div>
            </div>
          </div>
        </div>
      </aside>

      {/* ── Content ───────────────────────────────────────────── */}
      <main className="content-area" style={{gridColumn:2,overflowY:"auto",background:"var(--paper)"}}>
        {tab==="dashboard" &&<Dashboard data={data} ms={ms} currentMonth={cur} addToast={addToast} onNeedSetup={()=>setShowMoModal(true)} onTabChange={setTab}/>}
        {tab==="expenses"  &&<ExpensesTab data={data} ms={ms} currentMonth={cur} onDataChange={onDataChange} addToast={addToast} userId={user.uid}/>}
        {tab==="analytics" &&<AnalyticsTab data={data} currentMonth={cur}/>}
        {tab==="insights"  &&<InsightsTab data={data} ms={ms} currentMonth={cur} onDataChange={onDataChange} userId={user.uid} addToast={addToast}/>}
        {tab==="goals"     &&<GoalsTab data={data} ms={ms} onDataChange={onDataChange} addToast={addToast} userId={user.uid}/>}
        {tab==="history"   &&<HistoryTab data={data} currentMonth={cur} user={user}/>}
        {tab==="settings"  &&<SettingsTab data={data} ms={ms} user={user} currentMonth={cur} onDataChange={onDataChange} onMonthSetup={()=>setShowMoModal(true)} onLogout={onLogout} addToast={addToast} userId={user.uid}/>}
      </main>

      {/* FAB — quick add */}
      {tab!=="expenses"&&(
        <button className="fab" onClick={()=>setShowQuickAdd(true)} title="Quick add expense">＋</button>
      )}

      {/* Mobile bottom nav */}
      <nav className="bottom-nav">
        {TABS.map(t=>(
          <button key={t.id} className={`bottom-nav-btn${tab===t.id?" act":""}`} onClick={()=>setTab(t.id)}>
            <span className="bottom-nav-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </nav>

      {showQuickAdd&&(
        <QuickAddModal data={data} ms={ms} currentMonth={cur} onDataChange={onDataChange} addToast={addToast} userId={user.uid} onClose={()=>setShowQuickAdd(false)}/>
      )}

      {showMoModal&&(
        <MonthModal cur={cur} existing={ms} onSave={vals=>{
          const months={...(data.months||{})};months[cur]=vals;
          const nd={...data,months};const saved=saveData(user.uid,nd);onDataChange({...saved});
          setShowMoModal(false);
          addToast({type:"s",icon:"✅",title:"Budget set!",msg:`Daily limit: ${fmt(vals.spendBudget/DIM(cur))}/day`});
        }} onClose={()=>setShowMoModal(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
