          }}>
            <div style={{padding:'10px 16px 4px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:8,letterSpacing:'2px',textTransform:'uppercase',color:focusedField==='income'||inc>0?'var(--green)':'var(--faint)',fontWeight:600,transition:'color .2s'}}>Monthly Income</span>
              {inc>0&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--faint)'}}>100% base</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',padding:'2px 16px 12px',gap:6}}>
              <span style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:inc>0?'var(--green)':'var(--faint)',opacity:.5,lineHeight:1,flexShrink:0}}>৳</span>
              <input type="number" placeholder="0" value={income} onChange={e=>setIncome(e.target.value)} autoFocus
                onFocus={()=>setFocusedField('income')}
                onBlur={()=>setFocusedField(null)}
                style={{flex:1,background:'none',border:'none',outline:'none',
                  fontFamily:'var(--mono)',fontSize:28,fontWeight:700,
                  color:inc>0?'var(--green)':'var(--faint)',
                  lineHeight:1,padding:0,minWidth:0
                }}/>
            </div>
          </div>

          {/* Savings input */}
          <div style={{
            borderRadius:12,border:'1.5px solid',overflow:'hidden',
            borderColor:focusedField==='save'?'rgba(102,65,184,.55)':sv>0?'rgba(102,65,184,.25)':'var(--rule)',
            transition:'border-color .2s, box-shadow .2s',
            boxShadow:focusedField==='save'?'0 0 0 3px rgba(102,65,184,.08)':'none',
            background:'var(--wash)'
          }}>
            <div style={{padding:'10px 16px 4px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:8,letterSpacing:'2px',textTransform:'uppercase',color:focusedField==='save'||sv>0?'var(--plum)':'var(--faint)',fontWeight:600,transition:'color .2s'}}>Savings Target</span>
              {sv>0&&inc>0&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--faint)'}}>{Math.round(sv/inc*100)}% of income</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',padding:'2px 16px 12px',gap:6}}>
              <span style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:sv>0?'var(--plum)':'var(--faint)',opacity:.5,lineHeight:1,flexShrink:0}}>৳</span>
              <input type="number" placeholder="0" value={saveT} onChange={e=>setSaveT(e.target.value)}
                onFocus={()=>setFocusedField('save')}
                onBlur={()=>setFocusedField(null)}
                style={{flex:1,background:'none',border:'none',outline:'none',
                  fontFamily:'var(--mono)',fontSize:28,fontWeight:700,
                  color:sv>0?'var(--plum)':'var(--faint)',
                  lineHeight:1,padding:0,minWidth:0
                }}/>
            </div>
          </div>

          {/* Live daily limit */}
          {daily>0&&(
            <div style={{background:'linear-gradient(135deg,rgba(184,113,26,.07),rgba(184,113,26,.03))',border:'1.5px solid rgba(184,113,26,.18)',borderRadius:12,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontFamily:'var(--mono)',fontSize:8,letterSpacing:'1.8px',textTransform:'uppercase',color:'rgba(184,113,26,.6)',marginBottom:2}}>Daily Limit</div>
                <div style={{fontSize:10,color:'var(--faint)',fontFamily:'var(--sans)'}}>{DIM(cur)} days · after savings</div>
              </div>
              <div style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:22,color:'var(--gold)'}}>{fmt(daily)}</div>
            </div>
          )}

          {sv>inc&&inc>0&&(
            <div style={{background:'var(--reddim)',border:'1px solid rgba(184,56,56,.2)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--red)',fontWeight:600}}>
              ⚠ Savings target cannot exceed income.
            </div>
          )}

          <button disabled={!inc||sv>inc} onClick={()=>onSave({income:inc,saveTarget:sv,spendBudget:spend,salaryDate:todayISO()})} style={{
            width:'100%',padding:'13px',border:'none',borderRadius:10,marginTop:2,
            cursor:inc&&sv<=inc?'pointer':'not-allowed',
            background:inc&&sv<=inc?'linear-gradient(135deg,#b8711a,#c88020)':'var(--tint)',
            fontFamily:'var(--sans)',fontWeight:700,fontSize:14,
            color:inc&&sv<=inc?'#fff':'var(--ghost)',letterSpacing:.2,
            transition:'all .2s',boxShadow:inc&&sv<=inc?'0 3px 12px rgba(184,113,26,.25)':'none'
          }}>
            {existing?'Update Budget →':'Set Budget →'}
          </button>
        </div>
      </div>
    </div>
  );
}


function Dashboard({data,ms,currentMonth,addToast,onNeedSetup,onTabChange}){
  const{expenses=[],goals=[],recurringCosts=[],customCats=[],guiltyFreeDays=[],payDay=null}=data;
  const DIMv=DIM(currentMonth),DOMv=DOM(),todayStr=todayISO();
  const fixedMo=recurringCosts.filter(r=>r.type==="monthly").reduce((a,r)=>a+r.amount,0);
  const fixedD=recurringCosts.filter(r=>r.type==="daily").reduce((a,r)=>a+r.amount,0);
  const income=ms?.income||0,spendBudget=ms?.spendBudget||0,saveTarget=ms?.saveTarget||0;
  const discBudget=Math.max(0,spendBudget-fixedMo);
  const effDays=effectiveDailyDays(ms,currentMonth);
  const dailyLim=discBudget>0?discBudget/effDays-fixedD:0;
  const moExps=expenses.filter(e=>e.date.startsWith(currentMonth));
  const moSpent=moExps.reduce((a,e)=>a+e.amount,0);
  const todaySpent=expenses.filter(e=>e.date===todayStr).reduce((a,e)=>a+e.amount,0);
  const moLeft=spendBudget-moSpent;
  // daysLeft = days from today to next salary date (cycle end), not calendar month end
  const cycleEnd=(()=>{
    if(ms?.salaryDate){const nd=new Date(ms.salaryDate+'T00:00:00');nd.setMonth(nd.getMonth()+1);return nd;}
    return new Date(todayStr.slice(0,7)+'-'+DIMv.toString().padStart(2,'0')+'T00:00:00');
  })();
  const daysLeft=Math.max(1,Math.round((cycleEnd-new Date(todayStr+'T00:00:00'))/(1000*60*60*24)));
  const adjDaily=moLeft>0&&daysLeft>0?Math.max(0,moLeft/daysLeft-fixedD):0;
  const isOver=moLeft<0;
  // overspend stats — simple and correct
  const totalOver=isOver?moSpent-spendBudget:0;        // total ৳ over budget
  const daysPassed=Math.max(1,DOMv);                    // days elapsed
  const dailyOverspent=dailyLim>0?Math.max(0,todaySpent-dailyLim):0; // today's overspend vs daily limit
  const avgDailySpend=moSpent/daysPassed;               // actual avg daily spend
  // recovery: max you can spend per remaining day without going further over is ৳0 discretionary
  // (budget is already broken; show how much you need to cut vs daily limit)
  const dailyCutNeeded=isOver?Math.max(0,avgDailySpend-dailyLim):0;
  const ringPct=dailyLim>0?Math.min(100,todaySpent/dailyLim*100):0;
  const ringCol=ringPct>100?"var(--red)":ringPct>80?"var(--gold)":"var(--green)";
  const allCats=getAllCats(customCats);
  const catTotals=allCats.map(c=>({c,t:moExps.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const ds=d.toISOString().slice(0,10);
    const total=expenses.filter(e=>e.date===ds).reduce((a,e)=>a+e.amount,0);
    return{date:ds,lbl:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],total,isToday:ds===todayStr};
  });
  const maxDay=Math.max(1,...last7.map(d=>d.total));

  // ── Streak ──
  const streak=calcStreak(expenses,dailyLim);

  // ── Payday countdown ──
  const paydayMsg=useMemo(()=>{
    if(!payDay)return null;
    const now=new Date(),dom=now.getDate();
    let days=payDay-dom;
    if(days<0)days+=DIMv;
    if(days===0)return{text:"Payday today! 🎉",color:"var(--green)"};
    return{text:days+" days to payday ("+DOMv+"→"+payDay+")",color:"var(--gold)"};
  },[payDay,DOMv,DIMv]);

  // ── Smart warnings ──
  const warnings=useMemo(()=>{
    const w=[];
    if(!ms)return w;
    const pctMonth=DOMv/DIMv,pctBudget=spendBudget>0?moSpent/spendBudget:0;
    if(pctBudget>pctMonth+0.15)w.push({t:"d",msg:"You've used "+Math.round(pctBudget*100)+"% of your budget but only "+Math.round(pctMonth*100)+"% of the month is gone."});
    const prevMo=new Date();prevMo.setMonth(prevMo.getMonth()-1);
    const pmk=prevMo.toISOString().slice(0,7);
    const prevBills=expenses.filter(e=>e.date.startsWith(pmk)&&e.category==="Bills").reduce((a,e)=>a+e.amount,0);
    const curBills=moExps.filter(e=>e.category==="Bills").reduce((a,e)=>a+e.amount,0);
    if(prevBills>0&&curBills>prevBills*1.2)w.push({t:"w",msg:"Your Bills are "+Math.round((curBills/prevBills-1)*100)+"% higher than last month."});
    const topCat=catTotals[0];
    if(topCat&&spendBudget>0&&topCat.t/spendBudget>0.4&&DOMv<20)w.push({t:"w",msg:topCat.c+" is already "+Math.round(topCat.t/spendBudget*100)+"% of your monthly budget with "+daysLeft+" days left."});
    if(streak>=3)w.push({t:"s",msg:streak+" days under budget in a row! Keep it up!"});
    return w;
  },[ms,moSpent,spendBudget,DOMv,DIMv,catTotals,streak]);

  // ── Personality ──
  const personality=useMemo(()=>getPersonality(expenses,data.months||{}),[expenses]);

  const isGfd=guiltyFreeDays.includes(todayStr);

  if(!ms)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",minHeight:400}}>
      <div style={{textAlign:"center",maxWidth:380,padding:40}}>
        <div style={{fontSize:52,marginBottom:20}}>📋</div>
        <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:28,color:"var(--ink)",letterSpacing:"-.02em",marginBottom:10}}>Set up {fmtMYS(currentMonth)}</div>
        <p style={{fontSize:14,color:"var(--faint)",lineHeight:1.8,marginBottom:24}}>Enter your income and savings target to unlock your daily spending limit.</p>
        <button className="btn btn-gold" style={{padding:"12px 32px",fontSize:14}} onClick={onNeedSetup}>Set Up Budget →</button>
      </div>
    </div>
  );

  const cardStyle={background:"var(--card)",border:"1.5px solid var(--rule)",borderRadius:"var(--r)",boxShadow:"var(--s1)"};

  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}} className="fade-in">

      {/* Smart warnings */}
      {warnings.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {warnings.map((w,i)=>(
            <div key={i} className={`smart-warn ${w.t}`}>
              <span>{w.t==="d"?"⚠️":w.t==="s"?"✅":"💡"}</span>
              <span>{w.msg}</span>
            </div>
          ))}
        </div>
      )}

      {/* ── Row 1: Hero + Ring ─────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 220px",gap:14}}>

        {/* Hero card */}
        <div style={{...cardStyle,padding:"24px 28px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-50,right:-50,width:200,height:200,background:isOver?"radial-gradient(circle,rgba(184,56,56,.06),transparent 70%)":"radial-gradient(circle,rgba(184,113,26,.07),transparent 70%)",pointerEvents:"none"}}/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:"2px",textTransform:"uppercase",color:isOver?"var(--red)":"var(--gold)"}}>{isOver?"// over_budget":"// todays_adjusted_limit"}</div>
            {streak>=3&&<span className="streak-badge">🔥 {streak} day streak</span>}
            {isGfd&&<span style={{background:"var(--greendim)",color:"var(--green)",fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:999,border:"1.5px solid rgba(45,122,82,.25)"}}>😌 Guilt-Free Day</span>}
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6}}>
            <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:58,lineHeight:1,letterSpacing:"-.04em",color:isOver?"var(--red)":"var(--ink)"}}>
              {isOver?fmt(totalOver):fmt(Math.max(0,adjDaily||dailyLim))}
            </div>
            <div style={{fontSize:14,color:isOver?"var(--red)":"var(--faint)",fontFamily:"var(--sans)",fontWeight:isOver?700:400}}>{isOver?"total overspent":"/day"}</div>
          </div>
          <div style={{fontSize:12,color:"var(--faint)",marginBottom:14,lineHeight:1.7}}>
            {isOver
              ?<span style={{color:"var(--red)",fontWeight:600}}>৳{fmt(totalOver)} over budget · {daysLeft} days left to recover</span>
              :<span>Monthly budget <span style={{color:"var(--gold)",fontWeight:600}}>{fmt(spendBudget)}</span> · base <span style={{color:"var(--ink2)",fontWeight:600}}>{fmt(dailyLim)}/day</span> · {daysLeft} days left</span>}
          </div>

          {/* Recurring breakdown — only when not over and recurring exists */}
          {!isOver&&(fixedMo>0||fixedD>0)&&(
            <div style={{background:"var(--bluedim)",border:"1.5px solid rgba(74,133,201,.2)",borderRadius:9,padding:"8px 14px",marginBottom:10,fontSize:11,color:"var(--blue)",display:"flex",flexWrap:"wrap",gap:10}}>
              <span style={{fontWeight:700}}>📌 Recurring deducted:</span>
              {fixedMo>0&&<span>{fmt(fixedMo)}/mo fixed</span>}
              {fixedD>0&&<span>{fmt(fixedD)}/day daily</span>}
              <span style={{color:"var(--faint)"}}>→ discretionary limit: {fmt(Math.max(0,adjDaily||dailyLim))}/day</span>
            </div>
          )}

          {/* ── Salary cycle timeline ── */}
          {ms?.salaryDate&&(()=>{
            const start=new Date(ms.salaryDate+'T00:00:00');
            const end=new Date(start);end.setMonth(end.getMonth()+1);
            const today=new Date(todayStr+'T00:00:00');
            const total=Math.round((end-start)/(864e5));
            const elapsed=Math.max(0,Math.min(total,Math.round((today-start)/(864e5))));
            const pct=Math.round(elapsed/total*100);
            const fmt2=d=>{const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return d.getDate()+" "+mo[d.getMonth()];};
            return(
              <div style={{marginBottom:14,padding:"14px 16px",background:"var(--wash)",border:"1.5px solid var(--rule)",borderRadius:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:"var(--faint)"}}>salary cycle</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--gold)",fontWeight:700}}>{elapsed}d elapsed · {total-elapsed}d left</div>
                </div>
                {/* Bar */}
                <div style={{position:"relative",height:6,background:"var(--rule)",borderRadius:99,marginBottom:14}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:pct+"%",background:"linear-gradient(90deg,#b8711a,#d98c22)",borderRadius:99,transition:"width .4s"}}/>
                  {/* Today marker + label */}
                  <div style={{position:"absolute",top:"50%",left:pct+"%",transform:"translate(-50%,-50%)",width:12,height:12,borderRadius:"50%",background:"var(--gold)",border:"2px solid var(--card)",boxShadow:"0 0 0 2px var(--gold)",zIndex:1}}/>
                  <div style={{position:"absolute",top:12,left:pct+"%",transform:"translateX(-50%)",fontFamily:"var(--mono)",fontSize:8,color:"var(--gold)",fontWeight:700,whiteSpace:"nowrap"}}>today</div>
                </div>
                {/* Labels */}
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontFamily:"var(--mono)",fontSize:9,fontWeight:700,color:"var(--ink2)"}}>{fmt2(start)}</div>
                    <div style={{fontFamily:"var(--sans)",fontSize:9,color:"var(--faint)"}}>salary in</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"var(--mono)",fontSize:9,fontWeight:700,color:"var(--ink2)"}}>{fmt2(end)}</div>
                    <div style={{fontFamily:"var(--sans)",fontSize:9,color:"var(--faint)"}}>next salary</div>
                  </div>
                </div>
              </div>
            );
          })()}

          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--paper)",border:"1.5px solid var(--rule)",borderRadius:999,padding:"4px 12px",fontSize:11,fontWeight:600,color:todaySpent>dailyLim&&dailyLim>0?"var(--red)":"var(--green)"}}>
              {todaySpent>dailyLim&&dailyLim>0?"🔴":"🟢"} Today: {fmt(todaySpent)}
            </span>
            <span style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--paper)",border:"1.5px solid var(--rule)",borderRadius:999,padding:"4px 12px",fontSize:11,fontWeight:600,color:"var(--plum)"}}>
              🏦 Save {fmt(saveTarget)}/mo
            </span>
            {fixedMo>0&&<span style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--paper)",border:"1.5px solid var(--rule)",borderRadius:999,padding:"4px 12px",fontSize:11,fontWeight:600,color:"var(--blue)"}}>📌 Fixed {fmt(fixedMo)}/mo</span>}
            {paydayMsg&&<span style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--paper)",border:"1.5px solid var(--rule)",borderRadius:999,padding:"4px 12px",fontSize:11,fontWeight:600,color:paydayMsg.color}}>💸 {paydayMsg.text}</span>}
          </div>
          {isOver&&(
            <div style={{marginTop:16,padding:"16px",background:"var(--reddim)",border:"2px solid rgba(184,56,56,.35)",borderRadius:12}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.4,color:"var(--red)",marginBottom:12}}>⚠ Over-Budget Recovery</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
                {[
                  ["Total Overspent", fmt(totalOver)],
                  ["Daily Avg Over",  fmt(dailyOverspent)],
                  ["Days Remaining",  daysLeft+" days"],
                ].map(([l,v])=>(
                  <div key={l}>
                    <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(184,56,56,.8)",marginBottom:3}}>{l}</div>
                    <div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:14,color:"var(--red)"}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"rgba(184,56,56,.12)",border:"1px solid rgba(184,56,56,.25)",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:12,color:"var(--red)",fontWeight:600}}>You must cut {fmt(dailyCutNeeded)}/day from your average to stop worsening.</div>
              </div>
            </div>
          )}
        </div>

        {/* Ring card */}
        <div style={{...cardStyle,padding:"20px 18px",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"var(--faint)"}}>Today</div>
          <Ring v={todaySpent} max={dailyLim||1} size={120} stroke={11} color={ringCol} bg="var(--tint)">
            <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:ringCol,lineHeight:1}}>{Math.round(ringPct)}%</div>
            <div style={{fontSize:8,color:"var(--faint)",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>used</div>
          </Ring>
          <div style={{width:"100%",borderTop:"1px solid var(--rule)",paddingTop:10}}>
            {[["Spent",todaySpent,"var(--red)"],["Limit",dailyLim,"var(--gold)"],["Left",Math.max(0,dailyLim-todaySpent),"var(--green)"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}>
                <span style={{fontSize:11,color:"var(--faint)"}}>{l}</span>
                <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:c}}>{fmt(v)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Row 2: stat cards ────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${isOver?6:5},1fr)`,gap:12}}>
        {[
          {icon:"💵",label:"Income",value:income,color:"var(--green)",bar:"linear-gradient(90deg,#2d7a52,#4da87a)"},
          {icon:"🛒",label:"Spent",value:moSpent,color:"var(--red)",bar:"linear-gradient(90deg,#b83838,#e05858)"},
          {icon:"📉",label:"Today Over",value:dailyOverspent,color:dailyOverspent>0?"var(--red)":"var(--green)",bar:dailyOverspent>0?"linear-gradient(90deg,#7a1010,#b02020)":"linear-gradient(90deg,#2d7a52,#4da87a)",alert:dailyOverspent>0,sub:dailyOverspent>0?"over daily limit":"within limit"},
          ...(isOver?[{icon:"⚠️",label:"Overspent",value:totalOver,color:"var(--red)",bar:"linear-gradient(90deg,#8b1a1a,#c03030)",blink:true}]:[]),
          {icon:"📊",label:"Remaining",value:Math.abs(moLeft),color:moLeft>=0?"var(--gold)":"var(--red)",bar:moLeft>=0?"linear-gradient(90deg,#b8711a,#d98c22)":"linear-gradient(90deg,#b83838,#e05858)"},
          {icon:"🏦",label:"Savings",value:Math.max(0,income-moSpent),color:"var(--plum)",bar:"linear-gradient(90deg,#6641b8,#9462e8)"},
        ].map(s=>(
          <div key={s.label} style={{...cardStyle,padding:"16px 18px",position:"relative",overflow:"hidden",outline:s.blink?"2px solid rgba(184,56,56,.4)":s.alert?"2px solid rgba(184,56,56,.3)":"none"}}>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:"3px",background:s.bar}}/>
            {(s.blink||s.alert&&s.value>0)&&<div style={{position:"absolute",top:0,left:0,right:0,height:"100%",background:"rgba(184,56,56,.04)",pointerEvents:"none"}}/>}
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1.2,color:(s.blink||s.alert&&s.value>0)?"var(--red)":"var(--faint)",marginBottom:8}}>{s.icon} {s.label}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:s.value>999999?15:20,fontWeight:700,color:s.color,lineHeight:1}}>{fmt(s.value)}</div>
            {s.sub&&<div style={{fontFamily:"var(--mono)",fontSize:9,color:s.value>0?"rgba(184,56,56,.65)":"rgba(45,122,82,.65)",marginTop:5}}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* ── Row 3: Progress + 7-day + Categories ───────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>

        {/* Month progress */}
        <div style={{...cardStyle,padding:"20px 22px"}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.3,color:"var(--faint)",marginBottom:14}}>Month Progress — Day {DOMv}/{DIMv}</div>
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:12}}>
              <span style={{color:"var(--faint)"}}>Spending</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,color:isOver?"var(--red)":"var(--gold)",fontSize:12}}>{fmt(moSpent)} / {fmt(spendBudget)}</span>
            </div>
            <PBar val={moSpent} max={spendBudget||1} h={9} color={isOver?"#b83838":"#b8711a"} warn={isOver}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:"var(--ghost)"}}>
              <span>{Math.round(DOMv/DIMv*100)}% of month</span>
              <span>{Math.round(moSpent/(spendBudget||1)*100)}% of budget</span>
            </div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:12}}>
              <span style={{color:"var(--faint)"}}>Savings</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--plum)",fontSize:12}}>{fmt(Math.max(0,income-moSpent))} / {fmt(saveTarget)}</span>
            </div>
            <PBar val={Math.max(0,income-moSpent)} max={saveTarget||1} h={9} color="#6641b8"/>
          </div>
        </div>

        {/* 7-day bar chart */}
        <div style={{...cardStyle,padding:"20px 22px"}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.3,color:"var(--faint)",marginBottom:14}}>Last 7 Days</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:5,height:88}}>
            {last7.map(d=>{
              const barH=d.total>0?Math.max(6,d.total/maxDay*80):0;
              const col=d.isToday?"var(--gold)":dailyLim>0&&d.total>dailyLim?"var(--red)":"var(--blue)";
              return(
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:8,fontFamily:"var(--mono)",color:"var(--ghost)",lineHeight:1,height:10,display:"flex",alignItems:"center"}}>
                    {d.total>0&&Math.round(d.total/1000)>0?Math.round(d.total/1000)+"k":""}
                  </div>
                  <div style={{width:"100%",height:74,display:"flex",alignItems:"flex-end"}}>
                    <div style={{width:"100%",height:barH||2,borderRadius:"3px 3px 0 0",background:d.total===0?"var(--tint)":col,opacity:d.isToday?1:0.7,transition:"height .4s ease",outline:d.isToday?"2px solid var(--gold)":"none",outlineOffset:1}}/>
                  </div>
                  <div style={{fontSize:9,color:d.isToday?"var(--gold)":"var(--faint)",fontWeight:d.isToday?700:400}}>{d.lbl}</div>
                </div>
              );
            })}
          </div>
          {dailyLim>0&&<div style={{marginTop:10,fontSize:10,color:"var(--ghost)",fontFamily:"var(--mono)"}}>Daily limit: {fmt(Math.round(dailyLim))}</div>}
        </div>

        {/* Categories */}
        <div style={{...cardStyle,padding:"20px 22px"}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.3,color:"var(--faint)",marginBottom:14}}>By Category</div>
          {catTotals.length===0?(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:32,marginBottom:10}}>📊</div>
              <div style={{fontSize:12,color:"var(--ghost)",marginBottom:14}}>No expenses this month</div>
              <button style={{background:"none",border:"1.5px solid var(--rule)",borderRadius:8,padding:"6px 14px",fontSize:12,color:"var(--gold)",cursor:"pointer",fontFamily:"var(--sans)",fontWeight:600}} onClick={()=>onTabChange("expenses")}>Add expense →</button>
            </div>
          ):catTotals.slice(0,5).map(({c,t})=>(
            <div key={c} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
              <div style={{width:28,height:28,borderRadius:8,background:getCBG(c,customCats),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{getCIcon(c,customCats)}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                  <span style={{fontWeight:600,color:"var(--ink2)"}}>{c}</span>
                  <span style={{fontFamily:"var(--mono)",fontWeight:700,color:getCColor(c,customCats),fontSize:11}}>{fmt(t)}</span>
                </div>
                <PBar val={t} max={moSpent} h={4} color={getCColor(c,customCats)}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Row 4: Personality + Goals ─────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:personality?"1fr 2fr":"1fr",gap:14}}>
        {personality&&(
          <div className="personality-card">
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,opacity:.7,marginBottom:8}}>Spending Personality</div>
            <div style={{fontSize:32,marginBottom:6}}>{personality.emoji}</div>
            <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:20,marginBottom:6,lineHeight:1.1}}>{personality.type}</div>
            <div style={{fontSize:12,opacity:.85,lineHeight:1.6}}>{personality.desc}</div>
          </div>
        )}
        {goals.filter(g=>g.saved<g.target).length>0&&(
          <div style={{...cardStyle,padding:"20px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:17,color:"var(--ink)",letterSpacing:"-.01em"}}>Active Goals</div>
                <div style={{fontSize:11,color:"var(--faint)",marginTop:2}}>{goals.filter(g=>g.saved<g.target).length} in progress</div>
              </div>
              <button style={{background:"none",border:"1.5px solid rgba(184,113,26,.25)",borderRadius:8,padding:"7px 14px",fontSize:12,color:"var(--gold)",cursor:"pointer",fontWeight:700,fontFamily:"var(--sans)"}} onClick={()=>onTabChange("goals")}>View all →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {goals.filter(g=>g.saved<g.target).slice(0,4).map(g=>{
                const pct=Math.min(100,Math.round(g.saved/g.target*100));
                const rem=g.target-g.saved;
                const mos=ms?.saveTarget>0?Math.ceil(rem/ms.saveTarget):null;
                return(
                  <div key={g.id} style={{background:"var(--wash)",borderRadius:12,padding:"13px 15px",border:"1.5px solid var(--rule)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontWeight:700,fontSize:13,color:"var(--ink)"}}>{g.emoji} {g.name}</span>
                      {mos&&<span className="badge bp">{mos}mo</span>}
                    </div>
                    <PBar val={g.saved} max={g.target} h={5} color="#6641b8"/>
                    <div style={{fontSize:11,color:"var(--faint)",marginTop:5,fontFamily:"var(--mono)"}}>{pct}% · {fmt(rem)} left</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

    </div>
  );
}

function ExpensesTab({data,ms,currentMonth,onDataChange,addToast,userId}){
  const{expenses=[],recurringCosts=[],customCats=[],guiltyFreeDays=[]}=data;
  const allCats=getAllCats(customCats);
  const DIMv=DIM(currentMonth),DOMv=DOM(),todayStr=todayISO();
  const fixedMo=recurringCosts.filter(r=>r.type==="monthly").reduce((a,r)=>a+r.amount,0);
  const fixedD=recurringCosts.filter(r=>r.type==="daily").reduce((a,r)=>a+r.amount,0);
  const spendBudget=ms?.spendBudget||0;
  const dailyLim=spendBudget>0?Math.max(0,spendBudget-fixedMo)/effectiveDailyDays(ms,currentMonth)-fixedD:0;
  const moExps=expenses.filter(e=>e.date.startsWith(currentMonth));
  const moSpent=moExps.reduce((a,e)=>a+e.amount,0);
  const moLeft=spendBudget-moSpent;
  const cycleEndE=(()=>{
    if(ms?.salaryDate){const nd=new Date(ms.salaryDate+'T00:00:00');nd.setMonth(nd.getMonth()+1);return nd;}
    return new Date(todayStr.slice(0,7)+'-'+DIMv.toString().padStart(2,'0')+'T00:00:00');
  })();
  const daysLeft=Math.max(1,Math.round((cycleEndE-new Date(todayStr+'T00:00:00'))/(1000*60*60*24)));
  const adjDaily=moLeft>0?Math.max(0,moLeft/daysLeft-fixedD):0;
  const isOver=moLeft<0;
  const isGfd=guiltyFreeDays.includes(todayStr);

  const toggleGfd=()=>{
    const gfd=isGfd?guiltyFreeDays.filter(d=>d!==todayStr):[...guiltyFreeDays,todayStr];
    const nd={...data,guiltyFreeDays:gfd};
    const s=saveData(userId,nd);onDataChange({...s});
    addToast({type:"s",icon:isGfd?"📋":"😌",title:isGfd?"Tracking resumed":"Guilt-Free Day on",msg:isGfd?"Today's spending counts again":"Today excluded from averages"});
  };

  const emptyRow=()=>({id:uid(),desc:"",amount:"",category:allCats[0]||"Food",date:todayStr,note:"",recurring:false});
  const[rows,setRows]=useState([emptyRow()]);
  const[showForm,setShowForm]=useState(false);
  const setRow=(id,f,v)=>setRows(r=>r.map(x=>x.id===id?{...x,[f]:v}:x));
  const addRow=()=>setRows(r=>[...r,emptyRow()]);
  const removeRow=id=>setRows(r=>r.length>1?r.filter(x=>x.id!==id):r);

  const evalAmt=raw=>{
    if(!raw)return 0;
    if(!/[+\-*/]/.test(String(raw).replace(/^-/,'')))return Number(raw)||0;
    try{
      const safe=String(raw).replace(/[^0-9+\-*/.() ]/g,'');
      // eslint-disable-next-line no-new-func
      const v=Function('"use strict";return ('+safe+')')();
      return isFinite(v)&&v>=0?Math.round(v*100)/100:0;
    }catch(e){return 0;}
  };

  const submitAll=()=>{
    const valid=rows.filter(r=>evalAmt(r.amount)>0);
    if(!valid.length)return;
    const newExps=valid.map(r=>({id:uid(),desc:r.desc.trim()||r.category,amount:evalAmt(r.amount),category:r.category,date:r.date,note:r.note||"",recurring:r.recurring}));
    const nd={...data,expenses:[...expenses,...newExps]};
    const saved=saveData(userId,nd);onDataChange({...saved});
    const added=newExps.reduce((a,e)=>a+e.amount,0);
    if(moSpent+added>spendBudget&&moSpent<=spendBudget&&spendBudget>0)
      addToast({type:"d",icon:"💥",title:"Monthly budget exceeded",msg:fmt(moSpent+added-spendBudget)+" over your "+fmt(spendBudget)+" budget"});
    setRows([emptyRow()]);setShowForm(false);
  };

  const delExp=id=>{
    const nd={...data,expenses:expenses.filter(e=>e.id!==id)};
    const saved=saveData(userId,nd);onDataChange({...saved});
  };

  const grouped=moExps.slice().sort((a,b)=>b.date.localeCompare(a.date)).reduce((acc,e)=>{(acc[e.date]=acc[e.date]||[]).push(e);return acc;},{});

  return(
    <div style={{display:"grid",gridTemplateColumns:"460px 1fr",height:"100%"}} className="fade-in">

      {/* ── Left panel ── */}
      <div style={{borderRight:"1.5px solid var(--rule)",background:"var(--card)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* Status strip */}
        {ms&&(
          <div style={{padding:"16px 18px 14px",background:isOver?"linear-gradient(160deg,rgba(184,56,56,.06),transparent)":"linear-gradient(160deg,rgba(184,113,26,.04),transparent)",borderBottom:"1.5px solid var(--rule)"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:isOver?"var(--red)":"var(--gold)",opacity:.7,marginBottom:8}}>
              {isOver?"⚠ over budget":"// daily allowance"}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
              <div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:34,lineHeight:1,color:isOver?"var(--red)":"var(--ink)",letterSpacing:"-.03em"}}>
                {adjDaily>0&&!isOver?fmt(adjDaily):"৳0"}
              </div>
              <div style={{fontSize:12,color:"var(--faint)",fontWeight:400}}>/day left</div>
            </div>
            {!isOver&&(fixedMo>0||fixedD>0)&&(
              <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--blue)",marginBottom:6,opacity:.8}}>
                {fixedMo>0&&`−${fmt(fixedMo)}/mo `}{fixedD>0&&`−${fmt(fixedD)}/day `}recurring
              </div>
            )}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontFamily:"var(--mono)",fontSize:9,color:"var(--faint)"}}>
                <span style={{color:isOver?"var(--red)":undefined}}>{fmt(moSpent)} spent</span>
                <span>{fmt(spendBudget)} budget</span>
              </div>
              <PBar val={moSpent} max={spendBudget||1} h={4} color={isOver?"var(--red)":"var(--gold)"} warn={isOver}/>
            </div>
            <div style={{fontFamily:"var(--mono)",fontSize:9,color:isOver?"var(--red)":"var(--faint)"}}>
              {isOver
                ?<span>⚠ {fmt(Math.abs(moLeft))} over · {daysLeft} days left</span>
                :<span>{fmt(moLeft)} remaining · {daysLeft} days</span>}
            </div>
          </div>
        )}

        {/* Guilt-Free Day toggle */}
        <div style={{padding:"10px 16px",borderBottom:"1.5px solid var(--rule)"}}>
          <div className={`gfd-toggle${isGfd?" active":""}`} onClick={toggleGfd} style={{borderRadius:10,padding:"8px 12px"}}>
            <span style={{fontSize:16}}>{isGfd?"😌":"📋"}</span>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:isGfd?"var(--green)":"var(--ink2)"}}>{isGfd?"Guilt-Free Day Active":"Mark as Guilt-Free Day"}</div>
              <div style={{fontSize:10,color:"var(--faint)",marginTop:1}}>{isGfd?"Today excluded from averages":"No judgment — tap to enable"}</div>
            </div>
          </div>
        </div>

        {/* Add form */}
        <div style={{flex:1,overflowY:"auto"}}>
          {!showForm?(
            <div style={{padding:"16px 16px"}}>
              <button onClick={()=>setShowForm(true)} style={{
                width:"100%",padding:"18px 14px",
                background:"linear-gradient(160deg,rgba(45,122,82,.06),rgba(45,122,82,.02))",
                border:"1.5px dashed rgba(45,122,82,.3)",borderRadius:14,cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:7,transition:"all .2s"
              }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(45,122,82,.55)";e.currentTarget.style.background="rgba(45,122,82,.08)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(45,122,82,.3)";e.currentTarget.style.background="linear-gradient(160deg,rgba(45,122,82,.06),rgba(45,122,82,.02))";}}
              >
                <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#2d7a52,#4da87a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#e8f8ef",boxShadow:"0 3px 10px rgba(45,122,82,.3)"}}>+</div>
                <div style={{fontFamily:"var(--sans)",fontSize:13,fontWeight:700,color:"var(--green)"}}>Log Expense</div>
              </button>
            </div>
          ):(
            <div className="fade-in">
              <div style={{background:"linear-gradient(170deg,#152218,#0d1a10)",padding:"20px 20px 16px"}}>
                <div style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(77,168,122,.5)",marginBottom:10}}>// new entry</div>
                {rows.map((row,i)=>(
                  <div key={row.id} className="fade-in" style={{marginBottom:i<rows.length-1?18:0}}>
                    {rows.length>1&&(
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontFamily:"var(--mono)",fontSize:8,color:"rgba(77,168,122,.4)",letterSpacing:1,textTransform:"uppercase"}}>entry {i+1}</span>
                        <button onClick={()=>removeRow(row.id)} style={{background:"rgba(255,255,255,.05)",border:"none",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:9,color:"rgba(240,234,216,.35)"}}>remove</button>
                      </div>
                    )}
                    {/* Amount — calculator input */}
                    {(()=>{
                      const expr=row.amount||'';
                      const isExpr=/[+\-*/]/.test(String(expr).replace(/^-/,''));
                      let calcResult=null;
                      if(isExpr){
                        try{
                          const safe=String(expr).replace(/[^0-9+\-*/.() ]/g,'');
                          // eslint-disable-next-line no-new-func
                          const v=Function('"use strict";return ('+safe+')')();
                          if(isFinite(v)&&v>=0)calcResult=Math.round(v*100)/100;
                        }catch(e){}
                      }
                      return(
                        <div style={{position:"relative",marginBottom:12}}>
                          <span style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:"rgba(77,168,122,.35)",pointerEvents:"none",lineHeight:1}}>৳</span>
                          <input type="text" inputMode="decimal" placeholder="0.00" value={expr}
                            onChange={e=>setRow(row.id,"amount",e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();setRow(row.id,"amount",String(evalAmt(expr)));e.target.blur();}}}
                            onBlur={e=>{e.target.style.borderBottomColor="rgba(77,168,122,.2)";setRow(row.id,"amount",String(evalAmt(expr)));}}
                            autoFocus={i===0}
                            style={{width:"100%",paddingLeft:30,paddingRight:4,paddingTop:2,paddingBottom:6,
                              background:"none",border:"none",borderBottom:"1.5px solid rgba(77,168,122,.2)",
                              fontFamily:"var(--mono)",fontSize:36,fontWeight:700,color:"#a8e6b8",
                              outline:"none",boxSizing:"border-box",lineHeight:1,transition:"border .15s"
                            }}
                            onFocus={e=>e.target.style.borderBottomColor="rgba(77,168,122,.6)"}
                          />
                          {calcResult!==null&&(
                            <div style={{paddingLeft:30,paddingTop:4,display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:"#a8e6b8",opacity:.8,lineHeight:1}}>= {fmt(calcResult)}</span>
                            </div>
                          )}
                        </div>
                      );
                    })()}
                    {/* Description */}
                    <input placeholder="what was this for?" value={row.desc}
                      onChange={e=>setRow(row.id,"desc",e.target.value)}
                      style={{width:"100%",padding:"0 0 8px",background:"none",border:"none",
                        borderBottom:"1px solid rgba(77,168,122,.1)",fontFamily:"var(--sans)",
                        fontSize:12,color:"rgba(240,234,216,.6)",outline:"none",
                        boxSizing:"border-box",marginBottom:12
                      }}
                    />
                    {/* Category grid */}
                    <div style={{marginBottom:12}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:7,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(77,168,122,.4)",marginBottom:6}}>category</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
                        {allCats.map(c=>{
                          const sel=row.category===c;
                          return(
                            <button key={c} onClick={()=>setRow(row.id,"category",c)} style={{
                              padding:"7px 3px",border:"1px solid",
                              borderColor:sel?"rgba(77,168,122,.5)":"rgba(255,255,255,.05)",
                              borderRadius:8,cursor:"pointer",transition:"all .12s",
                              background:sel?"rgba(77,168,122,.15)":"rgba(255,255,255,.02)",
                              display:"flex",flexDirection:"column",alignItems:"center",gap:3
                            }}>
                              <span style={{fontSize:14,lineHeight:1}}>{getCIcon(c,customCats)}</span>
                              <span style={{fontFamily:"var(--sans)",fontSize:7,fontWeight:600,color:sel?"#a8e6b8":"rgba(240,234,216,.3)",lineHeight:1,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{c}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    {/* Date + note */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div>
                        <div style={{fontFamily:"var(--mono)",fontSize:7,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(77,168,122,.35)",marginBottom:4}}>date</div>
                        <input type="date" value={row.date} onChange={e=>setRow(row.id,"date",e.target.value)} style={{
                          width:"100%",padding:"6px 8px",
                          background:"rgba(255,255,255,.04)",border:"1px solid rgba(77,168,122,.12)",borderRadius:7,
                          fontFamily:"var(--mono)",fontSize:10,color:"rgba(240,234,216,.55)",
                          outline:"none",boxSizing:"border-box",colorScheme:"dark"
                        }}/>
                      </div>
                      <div>
                        <div style={{fontFamily:"var(--mono)",fontSize:7,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(77,168,122,.35)",marginBottom:4}}>note</div>
                        <input placeholder="optional" value={row.note||""} onChange={e=>setRow(row.id,"note",e.target.value)} style={{
                          width:"100%",padding:"6px 8px",
                          background:"rgba(255,255,255,.04)",border:"1px solid rgba(77,168,122,.12)",borderRadius:7,
                          fontFamily:"var(--sans)",fontSize:10,color:"rgba(240,234,216,.55)",
                          outline:"none",boxSizing:"border-box"
                        }}/>
                      </div>
                    </div>
                    {i<rows.length-1&&<div style={{height:1,background:"rgba(77,168,122,.08)",marginTop:14}}/>}
                  </div>
                ))}
              </div>
              <div style={{padding:"14px 20px",background:"var(--card)",borderTop:"1px solid rgba(77,168,122,.08)"}}>
                <button onClick={addRow} style={{
                  width:"100%",padding:"7px",marginBottom:8,
                  background:"none",border:"1px dashed rgba(45,122,82,.2)",
                  borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:600,
                  color:"var(--green)",fontFamily:"var(--sans)",opacity:.8
                }}>＋ add another</button>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={submitAll} style={{
                    flex:2,padding:"11px",
                    background:"linear-gradient(135deg,#2d7a52,#256845)",
                    border:"none",borderRadius:10,color:"#e8f8ef",
                    fontFamily:"var(--sans)",fontWeight:700,fontSize:12,cursor:"pointer",
                    boxShadow:"0 3px 12px rgba(45,122,82,.25)"
                  }}>
                    ✓ Log {rows.filter(r=>r.amount).length>1?rows.filter(r=>r.amount).length+" expenses":"expense"}
                  </button>
                  <button onClick={()=>{setShowForm(false);setRows([emptyRow()]);}} style={{
                    flex:1,padding:"11px",background:"none",
                    border:"1px solid var(--rule)",borderRadius:10,
                    fontFamily:"var(--sans)",fontWeight:600,fontSize:11,
                    color:"var(--faint)",cursor:"pointer"
                  }}>cancel</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── Right: expense list ── */}
      <div style={{overflowY:"auto",background:"var(--wash)",padding:"18px 20px",display:"flex",flexDirection:"column",gap:16}}>
        {Object.keys(grouped).length===0&&(

            <div style={{fontSize:52,marginBottom:14,opacity:.4}}>🧾</div>
            <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:20,color:"var(--ink2)",marginBottom:6}}>Nothing logged yet</div>

          const dayTotal=dayExps.reduce((a,e)=>a+e.amount,0);
          const over2=dailyLim>0&&dayTotal>dailyLim;
          const isToday=d2===todayStr;
          const isGfdDay=guiltyFreeDays.includes(d2);
          const dateObj=new Date(d2+"T00:00:00");
          const dayName=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dateObj.getDay()];
          const dayNum=dateObj.getDate();
          return(
            <div key={d2} className="fade-in" style={{borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1.5px solid var(--rule)"}}>

                padding:"10px 16px",
                background:isToday
                  ?"linear-gradient(135deg,rgba(184,113,26,.1),rgba(184,113,26,.04))"
                  :over2&&!isGfdDay
                  ?"linear-gradient(135deg,rgba(184,56,56,.06),rgba(184,56,56,.02))"
                  :"var(--card)",
                display:"flex",alignItems:"center",justifyContent:"space-between",
                borderBottom:"1px solid var(--rule)"
              }}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {/* Date badge */}
                  <div style={{
                    width:38,height:38,borderRadius:10,
                    background:isToday?"linear-gradient(135deg,#b8711a,#d98c22)":over2&&!isGfdDay?"rgba(184,56,56,.12)":"var(--wash)",
                    border:`1.5px solid ${isToday?"rgba(184,113,26,.4)":over2&&!isGfdDay?"rgba(184,56,56,.2)":"var(--rule)"}`,
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                    flexShrink:0
                  }}>
                    <div style={{fontFamily:"var(--mono)",fontSize:8,fontWeight:700,textTransform:"uppercase",color:isToday?"rgba(255,255,255,.7)":"var(--faint)",lineHeight:1,marginBottom:1}}>{dayName}</div>
                    <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:isToday?"#fff":over2&&!isGfdDay?"var(--red)":"var(--ink)",lineHeight:1}}>{dayNum}</div>
                  </div>
                  <div>
                    <div style={{fontFamily:"var(--sans)",fontWeight:700,fontSize:13,color:isToday?"var(--gold)":"var(--ink)"}}>
                      {isToday?"Today":""}
                      {!isToday&&d2}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                      <span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--faint)"}}>{dayExps.length} item{dayExps.length!==1?"s":""}</span>
                      {isGfdDay&&<span style={{fontSize:8,fontWeight:700,background:"var(--greendim)",color:"var(--green)",padding:"1px 5px",borderRadius:4}}>guilt-free</span>}
                    </div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:over2&&!isGfdDay?"var(--red)":"var(--ink)"}}>{fmt(dayTotal)}</div>
                  {dailyLim>0&&!isGfdDay&&(
                    <div style={{fontFamily:"var(--mono)",fontSize:9,color:over2?"var(--red)":"var(--green)",marginTop:2}}>
                      {over2?"↑ "+fmt(dayTotal-dailyLim)+" over":"✓ within limit"}
                    </div>
                  )}
                </div>
              </div>

              {/* Expense items */}
              <div style={{background:"var(--card)"}}>
                {dayExps.map((e,ei)=>(
                  <div key={e.id} style={{
                    display:"flex",alignItems:"center",gap:12,
                    padding:"10px 16px",
                    borderBottom:ei<dayExps.length-1?"1px solid var(--rule)":"none",
                    transition:"background .12s",cursor:"default"
                  }}
                  onMouseEnter={ev=>ev.currentTarget.style.background="var(--paper)"}
                  onMouseLeave={ev=>ev.currentTarget.style.background="var(--card)"}
                  >
                    {/* Color accent left bar */}
                    <div style={{width:3,height:32,borderRadius:99,background:getCColor(e.category,customCats),flexShrink:0,opacity:.7}}/>
                    {/* Icon */}
                    <div style={{width:32,height:32,borderRadius:9,background:getCBG(e.category,customCats),display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{getCIcon(e.category,customCats)}</div>
                    {/* Info */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:12,color:"var(--ink)",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc||e.category}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                        <span style={{fontSize:10,color:"var(--faint)"}}>{e.category}</span>
                        {e.note&&<span style={{fontSize:10,color:"var(--ghost)"}}>· {e.note}</span>}
                        {e.recurring&&<span style={{background:"var(--golddim)",color:"var(--gold)",fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3}}>recurring</span>}
                      </div>
                    </div>
                    {/* Amount */}
                    <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,color:"var(--ink2)",flexShrink:0}}>−{fmt(e.amount)}</div>
                    {/* Delete */}
                    <button onClick={()=>delExp(e.id)} style={{
                      width:22,height:22,borderRadius:6,border:"none",cursor:"pointer",
                      background:"transparent",color:"var(--ghost)",fontSize:11,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      flexShrink:0,transition:"all .12s",padding:0
                    }}
                    onMouseEnter={ev=>{ev.currentTarget.style.background="var(--reddim)";ev.currentTarget.style.color="var(--red)";}}
                    onMouseLeave={ev=>{ev.currentTarget.style.background="transparent";ev.currentTarget.style.color="var(--ghost)";}}
                    >✕</button>
                  </div>
                ))}
              </div>

              {/* Daily progress bar */}
              {dailyLim>0&&!isGfdDay&&(
                <div style={{padding:"7px 16px 8px",background:"var(--card)",borderTop:"1px solid var(--rule)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontFamily:"var(--mono)",fontSize:8,color:"var(--faint)"}}>
                    <span>{fmt(dayTotal)} spent</span>
                    <span>{fmt(dailyLim)} limit</span>
                  </div>
                  <PBar val={dayTotal} max={dailyLim} h={3} color={over2?"var(--red)":"var(--gold)"} warn={over2}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GoalsTab({data,ms,onDataChange,addToast,userId}){
  const{goals=[]}=data;
  const effSave=ms?.saveTarget||0;
  const[name,setName]=useState("");const[target,setTarget]=useState("");const[saved,setSaved]=useState("");const[emoji,setEmoji]=useState("🎯");
  const[expanded,setExpanded]=useState(null);const[addAmts,setAddAmts]=useState({});const[showAdd,setShowAdd]=useState(false);

  const addGoal=()=>{
    if(!name||!target)return;
    const nd={...data,goals:[...goals,{id:uid(),name:name.trim(),target:+target,saved:+(saved||0),emoji}]};
    const s=saveData(userId,nd);onDataChange({...s});
    setName("");setTarget("");setSaved("");setEmoji("🎯");setShowAdd(false);
  };
  const addSavings=id=>{
    const a=addAmts[id];if(!a)return;
    const ng=goals.map(g=>g.id===id?{...g,saved:Math.min(g.saved+Number(a),g.target)}:g);
    const nd={...data,goals:ng};const s=saveData(userId,nd);onDataChange({...s});
    setAddAmts(p=>({...p,[id]:""}));
    const g=goals.find(x=>x.id===id);
    if(g&&g.saved+Number(a)>=g.target)addToast({type:"s",icon:"🎉",title:"Goal reached!",msg:`You've saved enough for ${g.name}!`});
  };
  const delGoal=id=>{const nd={...data,goals:goals.filter(g=>g.id!==id)};const s=saveData(userId,nd);onDataChange({...s});};

  const GCOLS=["var(--plum)","var(--gold)","var(--green)","var(--blue)"];
  const GBGS=["var(--plumdim)","var(--golddim)","var(--greendim)","var(--bluedim)"];

  return(
    <div style={{padding:22,display:"flex",flexDirection:"column",gap:18,minHeight:"100%"}} className="fade-in">

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:28,color:"var(--ink)",letterSpacing:"-.02em"}}>Your Goals</div>
          <div style={{fontFamily:"var(--sans)",fontSize:12,color:"var(--faint)",marginTop:3}}>
            {goals.length} goal{goals.length!==1?"s":""} · saving {fmt(effSave)}/month
          </div>
        </div>
        <button className="btn btn-gold" onClick={()=>setShowAdd(p=>!p)}>{showAdd?"✕ Cancel":"＋ New Goal"}</button>
      </div>

      {showAdd&&(
        <div style={{background:"linear-gradient(135deg,rgba(104,69,184,.04),rgba(53,96,168,.03))",border:"1.5px solid rgba(104,69,184,.2)",borderRadius:16,padding:20}} className="fade-in">
          <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:18,color:"var(--plum)",marginBottom:16}}>What are you saving for?</div>
          <div style={{display:"grid",gridTemplateColumns:"56px 1fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
            <div className="field">
              <label className="flbl">Icon</label>
              <input className="inp" style={{textAlign:"center",fontSize:22,padding:"7px 4px"}} value={emoji} onChange={e=>setEmoji(e.target.value)} maxLength={2}/>
            </div>
            <div className="field">
              <label className="flbl">Goal Name</label>
              <input className="inp" placeholder="Trip, iPhone, Laptop…" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
            <div className="field">
              <label className="flbl">Target ৳</label>
              <input className="inp inp-num" type="number" placeholder="0" value={target} onChange={e=>setTarget(e.target.value)}/>
            </div>
            <div className="field">
              <label className="flbl">Already Saved ৳</label>
              <input className="inp inp-num" type="number" placeholder="0" value={saved} onChange={e=>setSaved(e.target.value)}/>
            </div>
            <button className="btn btn-gold" style={{padding:"10px 20px"}} onClick={addGoal} disabled={!name||!target}>Add</button>
          </div>
        </div>
      )}

      {goals.length===0?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"64px 24px",color:"var(--faint)",textAlign:"center"}}>
          <div style={{fontFamily:"var(--serif)",fontSize:64,marginBottom:16,opacity:.5}}>◎</div>
          <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:24,color:"var(--ink2)",marginBottom:8}}>No goals yet</div>
          <p style={{fontSize:13,lineHeight:1.9,maxWidth:320}}>Set a target for something you want to buy or achieve. We'll tell you exactly when you'll reach it.</p>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
          {goals.map((g,i)=>{
            const col=GCOLS[i%4];
            const bgd=GBGS[i%4];
            const pct=Math.min(100,Math.round(g.saved/g.target*100));
            const rem=Math.max(0,g.target-g.saved);
            const baseMo=effSave>0?Math.ceil(rem/effSave):null;
            const baseDate=baseMo?addMo(new Date(),baseMo):null;
            const isOpen=expanded===g.id;
            const scenarios=effSave>0?[
              {l:"Current plan",s:effSave,c:col},
              {l:"+10% faster",s:effSave*1.1,c:"var(--blue)"},
              {l:"+25% faster",s:effSave*1.25,c:"var(--green)"},
            ].map(x=>({...x,m:Math.ceil(rem/x.s),d:addMo(new Date(),Math.ceil(rem/x.s))})):[];
            return(
              <div key={g.id} style={{background:"var(--card)",border:"1.5px solid var(--rule)",borderRadius:18,padding:22,position:"relative",overflow:"hidden",boxShadow:"var(--s1)",transition:"transform .2s,box-shadow .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="var(--s2)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="var(--s1)";}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:col,borderRadius:"18px 18px 0 0"}}/>
                <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,background:"radial-gradient(circle,"+bgd+",transparent 70%)",pointerEvents:"none"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <span style={{fontSize:36,lineHeight:1}}>{g.emoji}</span>
                  <div style={{display:"flex",gap:5,alignItems:"center"}}>
                    {pct>=100&&<span className="badge bg">✓ Done!</span>}
                    <button className="btn-del" onClick={()=>delGoal(g.id)}>✕</button>
                  </div>
                </div>
                <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:22,color:"var(--ink)",marginBottom:2,letterSpacing:"-.01em"}}>{g.name}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--faint)",marginBottom:14}}>Target: {fmt(g.target)}</div>

                <div style={{background:"var(--wash)",borderRadius:99,height:6,overflow:"hidden",marginBottom:8}}>
                  <div style={{height:6,borderRadius:99,background:pct>=100?"var(--green)":col,width:pct+"%",transition:"width .7s ease"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--faint)",marginBottom:14}}>
                  <span style={{fontFamily:"var(--mono)",color:col,fontWeight:700}}>{fmt(g.saved)} saved</span>
                  <span style={{fontFamily:"var(--mono)"}}>{pct}%</span>
                </div>

                {baseMo&&pct<100&&(
                  <div style={{background:bgd,border:"1.5px solid",borderColor:"rgba(0,0,0,.12)",borderRadius:11,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:"var(--sans)",fontSize:10,fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:.8}}>At your savings rate</div>
                      <div style={{fontFamily:"var(--sans)",fontSize:11,color:"var(--faint)",marginTop:1}}>{fmt(effSave)}/month</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:28,color:col,lineHeight:1}}>{baseMo}<span style={{fontSize:14}}> mo</span></div>
                      <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--faint)"}}>{MSHT[baseDate.getMonth()]} {baseDate.getFullYear()}</div>
                    </div>
                  </div>
                )}

                {pct<100&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:7,marginBottom:8}}>
                    <input className="inp" type="number" placeholder="Add savings ৳" value={addAmts[g.id]||""} onChange={e=>setAddAmts(p=>({...p,[g.id]:e.target.value}))} style={{fontSize:13}}/>
                    <button className="btn btn-gold" style={{padding:"9px 14px"}} onClick={()=>addSavings(g.id)}>+</button>
                  </div>
                )}

                {pct<100&&scenarios.length>0&&(
                  <button onClick={()=>setExpanded(isOpen?null:g.id)} style={{background:"none",border:"none",cursor:"pointer",width:"100%",padding:"5px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"var(--faint)",fontFamily:"var(--sans)"}}>
                    {isOpen?"▲ hide":"▼ reach it faster"}
                  </button>
                )}
                {isOpen&&(
                  <div className="fade-in" style={{marginTop:6}}>
                    {scenarios.map((sc,j)=>(
                      <div key={j} style={{background:"var(--wash)",border:"1.5px solid var(--rule)",borderRadius:9,padding:"9px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontFamily:"var(--sans)",fontSize:12,fontWeight:700,color:sc.c}}>{sc.l}</div>
                          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--faint)"}}>{fmt(Math.round(sc.s))}/mo</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:22,color:sc.c,lineHeight:1}}>{sc.m}<span style={{fontSize:12}}> mo</span></div>
                          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--faint)"}}>{MSHT[sc.d.getMonth()]} {sc.d.getFullYear()}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function HistoryTab({data,currentMonth,user}){
  const{expenses=[],customCats=[]}=data;
  const[sel,setSel]=useState(null);
  const monthSet=new Set(expenses.map(e=>e.date.slice(0,7)));monthSet.add(currentMonth);
  const monthList=Array.from(monthSet).sort((a,b)=>b.localeCompare(a));
  const getMoData=mo=>{
    const exps=expenses.filter(e=>e.date.startsWith(mo));
    const total=exps.reduce((a,e)=>a+e.amount,0);
    const cats=getAllCats(customCats).map(c=>({c,t:exps.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
    return{exps,total,cats};
  };
  const sendReceipt=mo=>{
    const{exps,total,cats}=getMoData(mo);
    const lines=[`MoneyMind — ${fmtMY(mo)} Report`,`For: ${user.name} (${user.email})`,`Generated: ${new Date().toLocaleDateString()}`,``,`SUMMARY`,`Total: ${fmt(total)}`,`Transactions: ${exps.length}`,``];
    lines.push(`BY CATEGORY`);cats.forEach(({c,t})=>lines.push(`${CICON[c]} ${c}: ${fmt(t)} (${Math.round(t/total*100)}%)`));
    lines.push(``);lines.push(`ALL TRANSACTIONS`);lines.push(`DATE        CATEGORY        DESCRIPTION                   AMOUNT`);lines.push("─".repeat(70));
    exps.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>lines.push(`${e.date}  ${e.category.padEnd(14)}${(e.desc||e.category).padEnd(28)}${fmt(e.amount)}`));
    const subj=encodeURIComponent("MoneyMind — "+fmtMY(mo)+" Report");
    const bod=encodeURIComponent(lines.join("\n"));
    window.open("mailto:"+user.email+"?subject="+subj+"&body="+bod);
  };
  const selData=sel?getMoData(sel):null;
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 340px",minHeight:"100%"}} className="fade-in">

      {/* ── Month list ── */}
      <div style={{padding:22,display:"flex",flexDirection:"column",gap:8,overflowY:"auto"}}>
        <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:26,color:"var(--ink)",marginBottom:4,letterSpacing:"-.02em"}}>Expense Archive</div>
        <div style={{fontFamily:"var(--sans)",fontSize:12,color:"var(--faint)",marginBottom:14}}>Click a month to see the breakdown</div>
        {monthList.length===0&&<div style={{color:"var(--faint)",textAlign:"center",padding:"48px 0"}}>No history yet.</div>}
        {monthList.map(mo=>{
          const{total,cats,exps}=getMoData(mo);
          const isCur=mo===currentMonth;
          const isSel=sel===mo;
          return(
            <div key={mo} className="hist-row" style={{borderColor:isSel?"rgba(184,114,26,.35)":isCur?"rgba(184,114,26,.15)":"var(--rule)",background:isSel?"rgba(184,114,26,.03)":"var(--card)"}} onClick={()=>setSel(isSel?null:mo)}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div className="hist-month">{fmtMY(mo)}</div>
                  {isCur&&<span className="badge ba">current</span>}
                </div>
                <div style={{fontFamily:"var(--sans)",fontSize:11,color:"var(--faint)",marginTop:3}}>{cats.slice(0,3).map(c=>`${CICON[c.c]} ${c.c}`).join(" · ")||"no expenses"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="hist-amount" style={{color:total>0?"var(--red)":"var(--faint)"}}>{fmt(total)}</div>
                <div style={{fontFamily:"var(--sans)",fontSize:11,color:"var(--faint)",marginTop:2}}>{exps.length} tx</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Detail panel ── */}
      <div style={{borderLeft:"1.5px solid var(--rule)",background:"var(--card)",overflowY:"auto",padding:22}}>
        {!sel?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--faint)",textAlign:"center",padding:32}}>
            <div style={{fontFamily:"var(--serif)",fontSize:52,marginBottom:12,opacity:.4}}>⊟</div>
            <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:18,color:"var(--ink2)",marginBottom:6}}>Select a month</div>
            <p style={{fontSize:12,lineHeight:1.8}}>Click any month on the left to see its full breakdown</p>
          </div>
        ):(
          <div className="fade-in">
            <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:24,color:"var(--ink)",marginBottom:2,letterSpacing:"-.02em"}}>{fmtMY(sel)}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--faint)",marginBottom:18}}>{selData.exps.length} transactions · total {fmt(selData.total)}</div>

            {selData.cats.map(({c,t})=>(
              <div key={c} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:12,color:"var(--ink)"}}>{e.desc||e.category}</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--faint)"}}>{e.date}</div>
                </div>
                <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:"var(--ink2)"}}>{fmt(e.amount)}</span>
              </div>
            ))}
            {selData.exps.length>15&&<div style={{textAlign:"center",fontSize:11,color:"var(--faint)",paddingTop:8}}>+{selData.exps.length-15} more — send receipt to see all</div>}

            <div style={{marginTop:16,background:"var(--bluedim)",border:"1.5px solid rgba(53,96,168,.18)",borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:16,color:"var(--blue)",marginBottom:4}}>Send Full Report</div>
              <p style={{fontSize:12,color:"var(--faint)",marginBottom:12,lineHeight:1.7}}>Sends a detailed receipt to {user.email}</p>
              <button className="btn btn-ghost" style={{width:"100%",fontSize:12}} onClick={()=>sendReceipt(sel)}>📨 Email {fmtMY(sel)} Receipt</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Custom Category Manager ── */
function CustomCatManager({data,onDataChange,userId,addToast,C}){
  const{customCats=[]}=data;
  const[name,setName]=useState('');
  const[icon,setIcon]=useState('💡');
  const[color,setColor]=useState('#8b6ee0');
  const PRESET_COLORS=['#f59e0b','#4a85c9','#e879a0','#c05050','#3fa86b','#8b6ee0','#8c7060','#e07c3a','#3ab8c5','#c53ab8'];
  const addCat=()=>{
    if(!name.trim())return;
    if([...CATS,...customCats.map(c=>c.name)].map(n=>n.toLowerCase()).includes(name.trim().toLowerCase()))
      return addToast({type:'d',icon:'⚠️',title:'Already exists',msg:'A category with this name already exists'});
    const nd={...data,customCats:[...customCats,{id:uid(),name:name.trim(),icon,color}]};
    const s=saveData(userId,nd);onDataChange({...s});
    addToast({type:'s',icon,title:'Category added',msg:name.trim()});
    setName('');setIcon('💡');setColor('#8b6ee0');
  };
  const delCat=id=>{
    const nd={...data,customCats:customCats.filter(c=>c.id!==id)};
    const s=saveData(userId,nd);onDataChange({...s});
  };
  return(
    <div>
      <div style={{background:C.wash,border:`1.5px solid ${C.rule}`,borderRadius:14,padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'60px 1fr',gap:10,marginBottom:12}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:C.faint,marginBottom:6}}>Icon</div>
            <input style={{width:'100%',padding:'9px 4px',border:`1.5px solid ${C.rule}`,borderRadius:8,fontSize:22,textAlign:'center',background:C.card,color:C.ink,fontFamily:'sans-serif'}} value={icon} onChange={e=>setIcon(e.target.value)} maxLength={2}/>
          </div>
          <div>
            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:C.faint,marginBottom:6}}>Name</div>
            <input className="inp" placeholder="e.g. Gym, Pets, Kids..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()}/>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:C.faint,marginBottom:8}}>Colour</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {PRESET_COLORS.map(c=>(
              <button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:color===c?`3px solid ${C.ink}`:`2px solid transparent`,cursor:'pointer',transition:'border .15s'}}/>
            ))}
          </div>
        </div>
        <button className="btn btn-gold" style={{width:'100%'}} onClick={addCat}>＋ Add Category</button>
      </div>
      {customCats.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.3,color:C.faint,marginBottom:10}}>Your Custom Categories</div>
          {customCats.map(c=>(
            <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:C.card,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:8}}>
              <div style={{width:36,height:36,borderRadius:10,background:c.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{c.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:C.ink}}>{c.name}</div>
                <div style={{fontSize:11,color:C.faint,marginTop:2}}>Custom category</div>
              </div>
              <div style={{width:12,height:12,borderRadius:'50%',background:c.color,flexShrink:0}}/>
              <button className="btn-del" onClick={()=>delCat(c.id)}>✕</button>
            </div>
          ))}
        </div>
      )}
      {customCats.length===0&&(
        <div style={{textAlign:'center',padding:'24px',color:C.faint,fontSize:13}}>No custom categories yet. Add one above.</div>
      )}
    </div>
  );
}

function SettingsTab({data,ms,user,currentMonth,onDataChange,onMonthSetup,onLogout,addToast,userId}){
  const{recurringCosts:rcs=[]}=data;
  const[sec,setSec]=useState('budget');
  const[confirmClear,setConfirmClear]=useState(false);
  const[editBudget,setEditBudget]=useState(!ms);
  const[newIncome,setNewIncome]=useState(ms?.income||'');
  const[newSave,setNewSave]=useState(ms?.saveTarget||'');
  const effSpend=Math.max(0,(Number(newIncome)||0)-(Number(newSave)||0));
  const newDaily=effSpend>0?effSpend/DIM(currentMonth):0;
  useEffect(()=>{
    if(!ms)setEditBudget(true);
    else{setNewIncome(ms.income);setNewSave(ms.saveTarget);}
  },[ms]);

  const saveBudget=()=>{
    const i=Number(newIncome),s=Number(newSave);
    if(!i||s>i)return;
    const months={...(data.months||{})};
    months[currentMonth]={income:i,saveTarget:s,spendBudget:i-s,salaryDate:todayISO()};
    const nd={...data,months};
    const saved=saveData(userId,nd);
    onDataChange({...saved});
    addToast({type:'s',icon:'✅',title:'Budget saved',msg:`Daily limit: ${fmt((i-s)/DIM(currentMonth))}`});
    setEditBudget(false);
  };

  const[rcName,setRcName]=useState('');
  const[rcAmt,setRcAmt]=useState('');
  const[rcCat,setRcCat]=useState('Food');
  const[rcType,setRcType]=useState('monthly');
  const addRc=()=>{
    if(!rcName||!rcAmt)return;
    const nd={...data,recurringCosts:[...rcs,{id:uid(),name:rcName.trim(),amount:+rcAmt,category:rcCat,type:rcType}]};
    const s=saveData(userId,nd);onDataChange({...s});
    setRcName('');setRcAmt('');
    addToast({type:'s',icon:'✅',title:'Recurring cost added'});
  };
  const delRc=id=>{
    const nd={...data,recurringCosts:rcs.filter(r=>r.id!==id)};
    const s=saveData(userId,nd);onDataChange({...s});
  };
  const autoAddDaily=()=>{
    const t=todayISO();
    const todayExps=data.expenses.filter(e=>e.date===t);
    const toAdd=rcs.filter(r=>r.type==='daily'&&!todayExps.some(e=>e.desc===r.name&&e.date===t));
    if(!toAdd.length){addToast({type:'i',icon:'ℹ️',title:'Already logged',msg:"Today's recurring costs are already added"});return;}
    const ne=[...data.expenses,...toAdd.map(r=>({id:uid(),desc:r.name,amount:r.amount,category:r.category,date:t,recurring:true}))];
    const nd={...data,expenses:ne};
    const s=saveData(userId,nd);onDataChange({...s});
    addToast({type:'s',icon:'✅',title:`Added ${toAdd.length} recurring expense${toAdd.length>1?'s':''}`,msg:toAdd.map(r=>r.name).join(', ')});
  };

  /* ── clearAll: wipes every storage key, saves empty, updates state ── */
  const clearAll=()=>{
    const empty=emptyData();
    const idbKey='data_'+userId;
    ['mm_d_'+userId,'mm_ls_data_'+userId,'mm_ls_'+idbKey].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});
    window.MM.set(idbKey,empty).then(()=>{
      const saved=saveData(userId,empty);
      onDataChange({...saved});
    });
    addToast({type:'w',icon:'🗑️',title:'All data cleared',msg:'Your account is now fresh and empty'});
    setConfirmClear(false);
    setEditBudget(true);
    setSec('budget');
  };

  const NAVS=[
    {id:'budget',icon:'◈',label:'Budget'},
    {id:'recurring',icon:'↻',label:'Recurring'},
    {id:'appearance',icon:'🎨',label:'Appearance'},
    {id:'categories',icon:'🏷',label:'Categories'},
    {id:'payday',icon:'💸',label:'Payday'},
    {id:'account',icon:'◎',label:'Account'},
    {id:'danger',icon:'⚠',label:'Danger Zone',red:true},
  ];
  const C={ink:"var(--ink)",ink2:"var(--ink2)",faint:"var(--faint)",gold:"var(--gold)",gold2:"var(--gold2)",golddim:"var(--golddim)",green:"var(--green)",greendim:"var(--greendim)",red:"var(--red)",reddim:"var(--reddim)",blue:"var(--blue)",bluedim:"var(--bluedim)",plum:"var(--plum)",plumdim:"var(--plumdim)",rule:"var(--rule)",wash:"var(--wash)",paper:"var(--paper)",card:"var(--card)"};
  const mono={fontFamily:"var(--mono)"};
  const serif={fontFamily:"var(--serif)"};
  const lbl={fontFamily:"var(--sans)",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.4px",color:C.faint,marginBottom:6};

  return(

          }}>

        <div style={{flex:1}}/>
        {/* deploy hint */}
        <div style={{background:C.golddim,border:`1.5px solid rgba(184,114,26,.18)`,borderRadius:10,padding:'12px 13px',margin:'8px 0'}}>

        </div>
      </div>

      {/* ─ Panel ─ */}
      <div style={{padding:'28px 30px',overflowY:'auto'}}>
